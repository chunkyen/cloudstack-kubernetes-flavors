# Base: Cluster infrastructure + CCM + CSI (no CNI — overlays pick one)
# Override cluster-specific values in overlays/<name>/kustomization.yaml

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: capc-cluster-1

resources:
  - namespace.yaml
  - cloudstack-credentials.yaml
  - cluster-infra.yaml
  - control-plane.yaml
  - workers.yaml
  - cluster-resource-set.yaml

# CCM + CSI only — CNI is added by the overlay
configMapGenerator:
  - name: capc-cluster-1-addons
    options:
      disableNameSuffixHash: true
    files:
      - addons/ccm.yaml
      - addons/csi.yaml

# Labels applied to all resources
commonLabels:
  capc-one-shot: "full-stack"
