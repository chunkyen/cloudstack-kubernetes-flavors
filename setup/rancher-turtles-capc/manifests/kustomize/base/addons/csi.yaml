- kind: ServiceAccount
  name: cloudstack-csi-node
  namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudstack-csi-controller
  namespace: kube-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudstack-csi-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudstack-csi-controller
    spec:
      containers:
      - args:
        - --csi-address=$(ADDRESS)
        - --v=5
        - --timeout=5m
        - --feature-gates=Topology=true
        - --extra-create-metadata
        - --leader-election
        - --default-fstype=ext4
        env:
        - name: ADDRESS
          value: /var/lib/csi/sockets/plugin.io/csi.sock
        image: registry.k8s.io/sig-storage/csi-provisioner:v5.0.1
        name: csi-provisioner
        volumeMounts:
        - mountPath: /var/lib/csi/sockets/plugin.io
          name: socket-dir
      - args:
        - --csi-address=$(ADDRESS)
        - --v=5
        - --timeout=5m
        - --leader-election
        env:
        - name: ADDRESS
          value: /var/lib/csi/sockets/plugin.io/csi.sock
        image: registry.k8s.io/sig-storage/csi-attacher:v4.6.1
        name: csi-attacher
        volumeMounts:
        - mountPath: /var/lib/csi/sockets/plugin.io
          name: socket-dir
      - args:
        - --csi-address=$(ADDRESS)
        - --v=5
        - --timeout=5m
        - --leader-election
        env:
        - name: ADDRESS
          value: /var/lib/csi/sockets/plugin.io/csi.sock
        image: registry.k8s.io/sig-storage/csi-snapshotter:v6.3.0
        name: csi-snapshotter
        volumeMounts:
        - mountPath: /var/lib/csi/sockets/plugin.io
          name: socket-dir
      - args:
        - --csi-address=$(ADDRESS)
        - --v=5
        - --timeout=5m
        - --leader-election
        - --handle-volume-inuse-error=true
        env:
        - name: ADDRESS
          value: /var/lib/csi/sockets/plugin.io/csi.sock
        image: registry.k8s.io/sig-storage/csi-resizer:v1.11.1
        name: csi-resizer
        volumeMounts:
        - mountPath: /var/lib/csi/sockets/plugin.io
          name: socket-dir
      - args:
        - controller
        - --endpoint=$(CSI_ENDPOINT)
        - --cloudstack-config=/etc/cloudstack-csi-driver/cloud-config
        - --logging-format=text
        - --v=4
        env:
        - name: CSI_ENDPOINT
          value: unix:///var/lib/csi/sockets/plugin.io/csi.sock
        image: ghcr.io/cloudstack/cloudstack-csi-driver:main
        name: cloudstack-csi-driver
        volumeMounts:
        - mountPath: /var/lib/csi/sockets/plugin.io
          name: socket-dir
        - mountPath: /etc/cloudstack-csi-driver
          name: cloudstack-conf
      serviceAccountName: cloudstack-csi-controller
      volumes:
      - emptyDir: {}
        name: socket-dir
      - name: cloudstack-conf
        secret:
          secretName: cloudstack-secret
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudstack-csi-node
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudstack-csi-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudstack-csi-node
    spec:
      containers:
      - args:
        - node
        - --endpoint=$(CSI_ENDPOINT)
        - --cloudstack-config=/etc/cloudstack-csi-driver/cloud-config
        - --logging-format=text
        - --node-name=$(NODE_NAME)
        - --v=4
        env:
        - name: CSI_ENDPOINT
          value: unix:///csi/csi.sock
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        image: ghcr.io/cloudstack/cloudstack-csi-driver:main
        name: cloudstack-csi-driver
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /csi
          name: plugin-dir
        - mountPath: /var/lib/kubelet
          mountPropagation: Bidirectional
          name: kubelet-dir
        - mountPath: /dev
          name: device-dir
        - mountPath: /etc/cloudstack-csi-driver
          name: cloudstack-conf
      - args:
        - --csi-address=$(ADDRESS)
        - --kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)
        - --v=5
        env:
        - name: ADDRESS
          value: /csi/csi.sock
        - name: DRIVER_REG_SOCK_PATH
          value: /var/lib/kubelet/plugins/csi.cloudstack.apache.org/csi.sock
        image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.10.1
        name: node-driver-registrar
        volumeMounts:
        - mountPath: /csi
          name: plugin-dir
        - mountPath: /registration
          name: registration-dir
      hostNetwork: true
      serviceAccountName: cloudstack-csi-node
      volumes:
      - hostPath:
          path: /var/lib/kubelet/plugins/csi.cloudstack.apache.org/
          type: DirectoryOrCreate
        name: plugin-dir
      - hostPath:
          path: /var/lib/kubelet/plugins_registry/
          type: Directory
        name: registration-dir
      - hostPath:
          path: /var/lib/kubelet
          type: Directory
        name: kubelet-dir
      - hostPath:
          path: /dev
          type: Directory
        name: device-dir
      - name: cloudstack-conf
        secret:
          secretName: cloudstack-secret
---
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: csi.cloudstack.apache.org
spec:
  attachRequired: true
  fsGroupPolicy: File
  podInfoOnMount: true
  volumeLifecycleModes:
  - Persistent
  - Ephemeral
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: cloudstack-ssd
parameters:
  csi.cloudstack.apache.org/disk-offering-id: <disk-offering-uuid>
provisioner: csi.cloudstack.apache.org
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
