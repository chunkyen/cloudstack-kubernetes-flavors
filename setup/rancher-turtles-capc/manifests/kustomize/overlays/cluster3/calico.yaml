apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: calico-node
rules:
  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - namespaces
      - configmaps
      - serviceaccounts
    verbs: ["get"]
  - apiGroups: [""]
    resources:
      - pods/status
      - nodes/status
    verbs: ["update", "patch"]
  - apiGroups: [""]
    resources:
      - endpoints
      - services
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["crd.projectcalico.org"]
    resources:
      - globalfelixconfigs
      - felixconfigurations
      - bgppeers
      - globalbgpconfigs
      - bgpconfigurations
      - ippools
      - ipamblocks
      - ipamhandles
      - ipamconfigs
      - blockaffinities
      - clusterinformations
      - hostendpoints
      - caliconodestatuses
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["crd.projectcalico.org"]
    resources: ["ipreservations"]
    verbs: ["list"]
  - apiGroups: ["crd.projectcalico.org"]
    resources:
      - globalnetworksets
      - globalnetworkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["crd.projectcalico.org"]
    resources:
      - tier.globalnetworkpolicies
      - tier.globalnetworksets
    verbs: ["get", "list", "watch"]
---
