# CloudStack API credentials for CAPC v1beta3
# Deploy this secret in the same namespace as your cluster (e.g., capc-cluster2)
# Get API key/secret from CloudStack UI → Account → API Key
apiVersion: v1
kind: Secret
metadata:
  name: cloudstack-credentials
  namespace: capc-cluster2  # Must match the cluster namespace
type: Opaque
stringData:
  # CloudStack management server endpoint (full URL with scheme)
  api-url: "http://<management-server>:8080/client/api"
  # API key (from CloudStack UI)
  api-key: "<your-api-key>"
  # Secret key (from CloudStack UI)
  secret-key: "<your-secret-key>"
  # Verify SSL certificate (set to "false" for self-signed)
  verify-ssl: "false"
