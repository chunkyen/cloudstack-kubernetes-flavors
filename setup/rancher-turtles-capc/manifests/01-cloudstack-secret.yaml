# CloudStack API credentials for CAPC
# Replace the values below with your actual CloudStack credentials
# Get API key/secret from CloudStack UI → Account → API Key
apiVersion: v1
kind: Secret
metadata:
  name: cloudstack-config
  namespace: cattle-capi-system
type: Opaque
stringData:
  # CloudStack management server endpoint
  CLOUDSTACK_ENDPOINT: "http://<management-server>:8080/client/api"
  # API key (from CloudStack UI)
  CLOUDSTACK_API_KEY: "<your-api-key>"
  # Secret key (from CloudStack UI)
  CLOUDSTACK_SECRET_KEY: "<your-secret-key>"
  # Default zone (optional — can be specified per-cluster)
  CLOUDSTACK_DEFAULT_ZONE: "<zone-id>"
  # Default network (optional — can be specified per-cluster)
  CLOUDSTACK_DEFAULT_NETWORK: "<network-id>"
  # Region (optional — for multi-region setups)
  CLOUDSTACK_REGION: "<region-name>"
