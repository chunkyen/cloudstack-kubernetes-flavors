# All CAPI providers combined — apply all at once
# Prerequisite: cloudstack-secret.yaml must be applied first
---
apiVersion: turtles-capi.cattle.io/v1alpha1
kind: CAPIProvider
metadata:
  name: core
  namespace: cattle-capi-system
spec:
  name: cluster-api
  type: core
---
apiVersion: turtles-capi.cattle.io/v1alpha1
kind: CAPIProvider
metadata:
  name: kubeadm-bootstrap
  namespace: cattle-capi-system
spec:
  name: kubeadm
  type: bootstrap
---
apiVersion: turtles-capi.cattle.io/v1alpha1
kind: CAPIProvider
metadata:
  name: kubeadm-control-plane
  namespace: cattle-capi-system
spec:
  name: kubeadm
  type: controlPlane
---
apiVersion: turtles-capi.cattle.io/v1alpha1
kind: CAPIProvider
metadata:
  name: cloudstack
  namespace: cattle-capi-system
spec:
  name: cloudstack
  type: infrastructure
  configSecret:
    name: cloudstack-credentials
  # Enable CKS sync so CAPC registers workload clusters with syncWithACS: true
  # in CloudStack's Compute -> Kubernetes UI as ExternalManaged clusters.
  patches:
    - patch: |-
        [{"op": "replace", "path": "/spec/template/spec/containers/0/args/5", "value": "--enable-cloudstack-cks-sync=true"}]
      target:
        kind: Deployment
        name: capc-controller-manager
        namespace: cattle-capi-system
