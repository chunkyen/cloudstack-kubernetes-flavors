# Advanced CAPC cluster — inline cloud-init for image customization
#
# This example demonstrates Method 2: defining users and cloud-init scripts
# directly in KubeadmConfig. Use this when you need more than just SSH keys:
#
# - Custom users with specific sudo rules
# - Package installation (e.g., nvidia-container-toolkit, docker)
# - Kernel module loading
# - Systemd service configuration
# - File provisioning
#
# IMPORTANT: Replace ALL of the following before applying:
#
# 1. <reserved-public-ip>   — A free public IP from CloudStack network
# 2. <network-name-or-id>   — CloudStack network name or ID
# 3. <zone-name-or-id>      — CloudStack zone name or ID
# 4. <YOUR_SSH_PUBLIC_KEY>  — Your full SSH public key (e.g. ssh-ed25519 AAAA...)
#
# Namespace: All CAPI resources are created in the namespace specified here
# (default). This is the namespace on the management (Rancher) cluster.
# To apply to a different namespace without editing the file:
#   kubectl apply -f 12-custom-image-cluster.yaml -n my-clusters
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: capc-cluster-custom
  namespace: default
spec:
  clusterNetwork:
    pods:
      cidrBlocks: ["10.244.0.0/16"]
    serviceDomain: cluster.local
  controlPlaneRef:
    apiGroup: controlplane.cluster.x-k8s.io
    kind: KubeadmControlPlane
    name: capc-cluster-custom-control-plane
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: CloudStackCluster
    name: capc-cluster-custom
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: CloudStackCluster
metadata:
  name: capc-cluster-custom
  namespace: default
spec:
  controlPlaneEndpoint:
    host: "<reserved-public-ip>"  # Reserved public IP from CloudStack network
    port: 6443
  failureDomains:
    - name: fd-1
      zone:
        name: "<zone-name-or-id>"
        network:
          name: "<network-name-or-id>"
      acsEndpoint:
        name: cloudstack-credentials
        namespace: cattle-capi-system
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: capc-cluster-custom-control-plane
  namespace: default
spec:
  replicas: 1
  version: "v1.32.0"
  machineTemplate:
    spec:
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: CloudStackMachine
        name: capc-cluster-custom-control-plane
  kubeadmConfigSpec:
    clusterConfiguration:
      apiServer:
        certSANs:
          - "<reserved-public-ip>"  # Must match controlPlaneEndpoint.host
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          provider-id: "cloudstack:///'{{ ds.meta_data.instance_id }}'"
        name: "{{ local_hostname }}"
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          provider-id: "cloudstack:///'{{ ds.meta_data.instance_id }}'"
        name: "{{ local_hostname }}"
    users:
      - name: ubuntu
        sshAuthorizedKeys:
          - "<YOUR_SSH_PUBLIC_KEY>"  # Your full SSH public key
        sudo: ALL=(ALL) NOPASSWD:***
        home: /home/ubuntu
    preKubeadmCommands:
      - echo "Custom pre-kubeadm setup for control plane"
    postKubeadmCommands:
      - echo "Custom post-kubeadm setup for control plane"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: CloudStackMachine
metadata:
  name: capc-cluster-custom-control-plane
  namespace: default
spec:
  offering:
    name: "Medium"
  template:
    name: "capc-ubuntu-2404-kube-v1.32.3"
  # No sshKey field — SSH is handled via cloud-init in KubeadmConfig
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: capc-cluster-custom-workers
  namespace: default
spec:
  replicas: 2
  clusterName: capc-cluster-custom
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: capc-cluster-custom
  template:
    spec:
      clusterName: capc-cluster-custom
      version: "v1.32.0"
      bootstrap:
        configRef:
          apiGroup: bootstrap.cluster.x-k8s.io
          kind: KubeadmConfig
          name: capc-cluster-custom-workers
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: CloudStackMachine
        name: capc-cluster-custom-workers
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: CloudStackMachine
metadata:
  name: capc-cluster-custom-workers
  namespace: default
spec:
  offering:
    name: "Medium"
  template:
    name: "capc-ubuntu-2404-kube-v1.32.3"
  # No sshKey field — SSH is handled via cloud-init in KubeadmConfig
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfig
metadata:
  name: capc-cluster-custom-workers
  namespace: default
spec:
  users:
    - name: ubuntu
      sshAuthorizedKeys:
        - "<YOUR_SSH_PUBLIC_KEY>"  # Your full SSH public key
      sudo: ALL=(ALL) NOPASSWD:***
      home: /home/ubuntu
  preKubeadmCommands:
    - echo "Custom pre-kubeadm setup for workers"
  postKubeadmCommands:
    - echo "Custom post-kubeadm setup for workers"
  joinConfiguration:
    nodeRegistration:
      kubeletExtraArgs:
        provider-id: "cloudstack:///'{{ ds.meta_data.instance_id }}'"
      name: "{{ local_hostname }}"
