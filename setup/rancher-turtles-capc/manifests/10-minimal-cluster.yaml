# Minimal CAPC cluster — 1 control plane + 2 workers
# Replace placeholders before applying:
#   <reserved-public-ip>   — a free public IP from CloudStack
#   <network-name-or-id>   — CloudStack network name or ID
#   <zone-name-or-id>      — CloudStack zone name or ID
#
# Namespace: All CAPI resources are created in the namespace specified here
# (default). This is the namespace on the management (Rancher) cluster where
# CloudStackCluster, KubeadmControlPlane, MachineDeployment, etc. live.
# The workload cluster itself is just VMs on CloudStack — it has no namespace.
# To apply to a different namespace without editing the file:
#   kubectl apply -f 10-minimal-cluster.yaml -n my-clusters
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: capc-cluster-1
  namespace: default
spec:
  clusterNetwork:
    pods:
      cidrBlocks: ["10.244.0.0/16"]
    serviceDomain: cluster.local
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: capc-cluster-1-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: CloudStackCluster
    name: capc-cluster-1
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: CloudStackCluster
metadata:
  name: capc-cluster-1
  namespace: default
spec:
  controlPlaneEndpoint:
    host: "<reserved-public-ip>"  # Reserved public IP from CloudStack network
    port: 6443
  network:
    name: "<network-name-or-id>"
  zone:
    name: "<zone-name-or-id>"
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: capc-cluster-1-control-plane
  namespace: default
spec:
  replicas: 1
  version: "v1.32.0"
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: CloudStackMachine
      name: capc-cluster-1-control-plane
  kubeadmConfigSpec:
    clusterConfiguration:
      apiServer:
        certSANs:
          - "<reserved-public-ip>"  # Must match controlPlaneEndpoint.host
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: CloudStackMachine
metadata:
  name: capc-cluster-1-control-plane
  namespace: default
spec:
  serviceOffering: "Medium"
  template: "capc-ubuntu-2404-kube-v1.32.3"
  diskOffering: "Large"
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: capc-cluster-1-workers
  namespace: default
spec:
  replicas: 2
  clusterName: capc-cluster-1
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: capc-cluster-1
  template:
    spec:
      version: "v1.32.0"
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfig
          name: capc-cluster-1-workers
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: CloudStackMachine
        name: capc-cluster-1-workers
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: CloudStackMachine
metadata:
  name: capc-cluster-1-workers
  namespace: default
spec:
  serviceOffering: "Medium"
  template: "capc-ubuntu-2404-kube-v1.32.3"
  diskOffering: "Large"
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfig
metadata:
  name: capc-cluster-1-workers
  namespace: default
spec: {}
