  csi-snapshot-crds.yaml: |
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: volumesnapshotclasses.snapshot.storage.k8s.io
    spec:
      group: snapshot.storage.k8s.io
      names:
        kind: VolumeSnapshotClass
        listKind: VolumeSnapshotClassList
        plural: volumesnapshotclasses
        shortNames:
          - vsclass
          - vsclasses
        singular: volumesnapshotclass
      scope: Cluster
      versions:
        - additionalPrinterColumns:
            - jsonPath: .driver
              name: Driver
              type: string
            - description: Determines whether a VolumeSnapshotContent created through the VolumeSnapshotClass should be deleted when its bound VolumeSnapshot is deleted.
              jsonPath: .deletionPolicy
              name: DeletionPolicy
              type: string
            - jsonPath: .metadata.creationTimestamp
              name: Age
              type: date
          name: v1
          schema:
            openAPIV3Schema:
              type: object
              properties:
                deletionPolicy:
                  type: string
                  enum: [Delete, Retain]
                driver:
                  type: string
                parameters:
                  type: object
                  additionalProperties:
                    type: string
          served: true
          storage: true
          subresources: {}
    ---
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: volumesnapshotcontents.snapshot.storage.k8s.io
    spec:
      group: snapshot.storage.k8s.io
      names:
        kind: VolumeSnapshotContent
        listKind: VolumeSnapshotContentList
        plural: volumesnapshotcontents
        shortNames:
          - vsc
          - vscs
        singular: volumesnapshotcontent
      scope: Cluster
      versions:
        - additionalPrinterColumns:
            - description: Indicates if the snapshot is ready to be used to restore a volume.
              jsonPath: .status.readyToUse
              name: ReadyToUse
              type: boolean
            - description: Represents the complete size of the snapshot in bytes
              jsonPath: .status.restoreSize
              name: RestoreSize
              type: integer
            - description: Determines whether this VolumeSnapshotContent and its physical snapshot on the underlying storage system should be deleted when its bound VolumeSnapshot is deleted.
              jsonPath: .spec.deletionPolicy
              name: DeletionPolicy
              type: string
            - description: Name of the CSI driver used to create the physical snapshot on the underlying storage system.
              jsonPath: .spec.driver
              name: Driver
              type: string
            - description: Name of the VolumeSnapshotClass to which this snapshot belongs.
              jsonPath: .spec.volumeSnapshotClassName
              name: VolumeSnapshotClass
              type: string
            - description: Name of the VolumeSnapshot object to which this VolumeSnapshotContent object is bound.
              jsonPath: .spec.volumeSnapshotRef.name
              name: VolumeSnapshot
              type: string
            - description: Namespace of the VolumeSnapshot object to which this VolumeSnapshotContent object is bound.
              jsonPath: .spec.volumeSnapshotRef.namespace
              name: VolumeSnapshotNamespace
              type: string
            - jsonPath: .metadata.creationTimestamp
              name: Age
              type: date
          name: v1
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  properties:
                    deletionPolicy:
                      type: string
                      enum: [Delete, Retain]
                    driver:
                      type: string
                    source:
                      type: object
                      properties:
                        snapshotHandle:
                          type: string
                        volumeHandle:
                          type: string
                    sourceVolumeMode:
                      type: string
                    volumeSnapshotClassName:
                      type: string
                    volumeSnapshotRef:
                      type: object
                      properties:
                        apiVersion:
                          type: string
                        fieldPath:
                          type: string
                        kind:
                          type: string
                        name:
                          type: string
                        namespace:
                          type: string
                status:
                  type: object
                  properties:
                    creationTime:
                      type: integer
                    error:
                      type: object
                      properties:
                        message:
                          type: string
                        time:
                          type: string
                    readyToUse:
                      type: boolean
                    restoreSize:
                      type: integer
                    snapshotHandle:
                      type: string
          served: true
          storage: true
          subresources:
            status: {}
    ---
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: volumesnapshots.snapshot.storage.k8s.io
    spec:
      group: snapshot.storage.k8s.io
      names:
        kind: VolumeSnapshot
        listKind: VolumeSnapshotList
        plural: volumesnapshots
        shortNames:
          - vs
        singular: volumesnapshot
      scope: Namespaced
      versions:
        - additionalPrinterColumns:
            - description: Indicates if the snapshot is ready to be used to restore a volume.
              jsonPath: .status.readyToUse
              name: ReadyToUse
              type: boolean
            - description: If a new snapshot needs to be created, the name of the source PVC from which this snapshot was (or will be) created.
              jsonPath: .spec.source.persistentVolumeClaimName
              name: SourcePVC
              type: string
            - description: If a snapshot already exists, the name of the source VolumeSnapshotContent from which this snapshot was (or will be) created.
              jsonPath: .spec.source.volumeSnapshotContentName
              name: SourceSnapshotContent
              type: string
            - description: Represents the minimum size of the underlying volume required to re-create a volume from this snapshot.
              jsonPath: .status.restoreSize
              name: RestoreSize
              type: string
            - description: The name of the VolumeSnapshotClass requested by the VolumeSnapshot.
              jsonPath: .spec.volumeSnapshotClassName
              name: SnapshotClass
              type: string
            - description: Name of the VolumeSnapshotContent object to which the VolumeSnapshot object intends to bind to.
              jsonPath: .status.boundVolumeSnapshotContentName
              name: SnapshotContent
              type: string
            - description: Timestamp when the point-in-time snapshot was taken by the underlying storage system.
              jsonPath: .status.creationTime
              name: CreationTime
              type: date
            - jsonPath: .metadata.creationTimestamp
              name: Age
              type: date
          name: v1
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  properties:
                    source:
                      type: object
                      properties:
                        persistentVolumeClaimName:
                          type: string
                        volumeSnapshotContentName:
                          type: string
                    volumeSnapshotClassName:
                      type: string
                status:
                  type: object
                  properties:
                    boundVolumeSnapshotContentName:
                      type: string
                    creationTime:
                      type: string
                    error:
                      type: object
                      properties:
                        message:
                          type: string
                        time:
                          type: string
                    readyToUse:
                      type: boolean
                    restoreSize:
                      type: string
          served: true
          storage: true
          subresources:
            status: {}
  csi-rbac.yaml: |
    apiVersion: v1
    kind: ServiceAccount
