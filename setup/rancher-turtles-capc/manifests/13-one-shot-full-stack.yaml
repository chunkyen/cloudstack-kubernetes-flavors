# One-Shot Full-Stack CAPC Cluster — CCM + CSI + Rancher Auto-Import
#
# Apply this file to get:
#   ✅ Kubernetes cluster (1 control plane + 2 workers)
#   ✅ CloudStack CCM (Kubernetes Provider) — LoadBalancer services + node labels
#   ✅ CloudStack CSI Driver — persistent storage with PVC support
#   ✅ Rancher auto-import — cluster appears in Rancher UI automatically
#
# This is the CAPC equivalent of CKS's "one ISO, everything works" experience.
#
# CNI (Calico), CCM, and CSI are all installed automatically via
# ClusterResourceSet (see Step 3 in full-stack-onboarding.md).
#
# IMPORTANT: Replace ALL of the following before applying:
#
# 1. <reserved-public-ip>   — A free public IP from CloudStack network
#    Find free IPs: cmk list publicipaddresses listall=true zoneid=<zone-id> forvirtualnetwork=true allocatedonly=false
#
# 2. <network-name-or-id>   — CloudStack network name or ID
#    List networks: cmk list networks listall=true zoneid=<zone-id>
#
# 3. <zone-name-or-id>      — CloudStack zone name or ID
#    List zones: cmk list zones
#
# 4. capc-ubuntu24-1.35     — CAPI-compatible template name
#    Must be registered in CloudStack. Prebuilt images: http://packages.shapeblue.com/cluster-api-provider-cloudstack/images/
#
# 5. kube control / kube worker1  — CloudStack service offering names
#    List offerings: cmk list serviceofferings listall=true
#    Control plane needs ≥2GB RAM, 2 vCPU
#
# 6. cylabnb-k1  — CloudStack SSH keypair name (registered via cmk)
#    cmk register-sshkeypair --name=cylabnb-k1 --publickey="$(cat ~/.ssh/id_ed25519.pub)"
#
# 7. <cloudstack-api-url>   — CloudStack management server API URL
#    Example: http://192.168.1.100:8080/client/api
#
# 8. <api-key> / <secret-key>  — CloudStack API credentials
#    Get from CloudStack UI → Account → API Key
#
# ---
# Usage:
#   kubectl apply -f 13-one-shot-full-stack.yaml
#
# That's it. Wait ~5 minutes, then check Rancher UI.
# ---

# ─── Namespace ─────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: capc-cluster-1

# ─── CloudStack Credentials Secret ─────────────────────────────────
# Used by CAPC (via acsEndpoint) and referenced by CCM/CSI ConfigMap
apiVersion: v1
kind: Secret
metadata:
  name: cloudstack-credentials
  namespace: capc-cluster-1
type: Opaque
stringData:
  api-url: "<cloudstack-api-url>"
  api-key: "<api-key>"
  secret-key: "<secret-key>"
  verify-ssl: "false"

# ─── Cluster ───────────────────────────────────────────────────────
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: capc-cluster-1
  namespace: capc-cluster-1
  labels:
    # This label tells Rancher Turtles to automatically import this CAPI cluster
    # into Rancher once its ControlPlaneAvailable condition is True.
    cluster-api.cattle.io/rancher-auto-import: "true"
    capc-one-shot: "full-stack"
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - "10.168.0.0/16"
    serviceDomain: cluster.local
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: capc-cluster-1-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
    kind: CloudStackCluster
    name: capc-cluster-1

# ─── CloudStackCluster ─────────────────────────────────────────────
apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
kind: CloudStackCluster
metadata:
  name: capc-cluster-1
  namespace: capc-cluster-1
spec:
  controlPlaneEndpoint:
    host: "<reserved-public-ip>"
    port: 6443
  failureDomains:
    - name: "<zone-name-or-id>"
      zone:
        name: "<zone-name-or-id>"
        network:
          name: "<network-name-or-id>"
      acsEndpoint:
        name: cloudstack-credentials
        namespace: capc-cluster-1
      offering: DefaultNetworkOfferingforKubernetesService
      syncWithACS: true

# ─── KubeadmControlPlane ───────────────────────────────────────────
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: capc-cluster-1-control-plane
  namespace: capc-cluster-1
spec:
  replicas: 1
  version: v1.35.0
  kubeadmConfigSpec:
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          provider-id: "cloudstack:///'{{ ds.meta_data.instance_id }}'"
        name: "{{ local_hostname }}"
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          provider-id: "cloudstack:///'{{ ds.meta_data.instance_id }}'"
        name: "{{ local_hostname }}"
    preKubeadmCommands:
      - swapoff -a
    postKubeadmCommands:
      - echo "Control plane setup complete"
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
      kind: CloudStackMachineTemplate
      name: capc-cluster-1-control-plane

# ─── Control Plane Machine Template ────────────────────────────────
apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
kind: CloudStackMachineTemplate
metadata:
  name: capc-cluster-1-control-plane
  namespace: capc-cluster-1
spec:
  template:
    spec:
      offering:
        name: "kube control"
      sshKey: "cylabnb-k1"
      template:
        name: "capc-ubuntu24-1.35"

# ─── MachineDeployment (Workers) ───────────────────────────────────
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: capc-cluster-1-md-0
  namespace: capc-cluster-1
spec:
  clusterName: capc-cluster-1
  replicas: 2
  selector:
    matchLabels: null
  template:
    spec:
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: capc-cluster-1-md-0
      clusterName: capc-cluster-1
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
        kind: CloudStackMachineTemplate
        name: capc-cluster-1-md-0
      version: v1.35.0

# ─── Worker Machine Template ───────────────────────────────────────
apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
kind: CloudStackMachineTemplate
metadata:
  name: capc-cluster-1-md-0
  namespace: capc-cluster-1
spec:
  template:
    spec:
      offering:
        name: "kube worker1"
      sshKey: "cylabnb-k1"
      template:
        name: "capc-ubuntu24-1.35"

# ─── KubeadmConfigTemplate (Workers) ───────────────────────────────
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: capc-cluster-1-md-0
  namespace: capc-cluster-1
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            provider-id: "cloudstack:///'{{ ds.meta_data.instance_id }}'"
          name: "{{ local_hostname }}"
      preKubeadmCommands:
        - swapoff -a

# ─── Post-Deployment ConfigMap (CNI + CCM + CSI) ───────────────────
# ClusterResourceSet will apply these to the workload cluster after it's ready.
apiVersion: v1
kind: ConfigMap
metadata:
  name: capc-cluster-1-post-deploy
  namespace: capc-cluster-1
  labels:
    capc-one-shot: "full-stack"
