    ---
    # Calico ServiceAccounts
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: calico-node
      namespace: kube-system
    ---
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: calico-kube-controllers
      namespace: kube-system
    ---
    # Calico ClusterRoles (full permissions matching official manifest)
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: calico-node
    rules:
      - apiGroups: [""]
        resources:
          - pods
          - nodes
          - namespaces
          - configmaps
          - serviceaccounts
        verbs:
          - get
      - apiGroups: [""]
        resources:
          - pods/status
          - nodes/status
        verbs:
          - update
          - patch
      - apiGroups: [""]
        resources:
          - endpoints
          - services
        verbs:
          - get
          - list
          - watch
      - apiGroups: [""]
        resources:
          - nodes
        verbs:
          - get
          - list
          - watch
          - update
          - patch
      - apiGroups: ["networking.k8s.io"]
        resources:
          - networkpolicies
        verbs:
          - get
          - list
          - watch
      - apiGroups: [""]
        resources:
          - pods
          - namespaces
          - serviceaccounts
        verbs:
          - get
          - list
          - watch
      - apiGroups: [""]
        resources:
          - configmaps
        verbs:
          - get
      - apiGroups: ["discovery.k8s.io"]
        resources:
          - endpointslices
        verbs:
          - get
          - list
          - watch
      - apiGroups: ["crd.projectcalico.org"]
        resources:
          - globalfelixconfigs
          - felixconfigurations
          - bgppeers
          - globalbgpconfigs
          - bgpconfigurations
          - ippools
          - ipamblocks
          - ipamhandles
          - ipamconfigs
          - blockaffinities
          - clusterinformations
          - hostendpoints
          - caliconodestatuses
        verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
      - apiGroups: ["crd.projectcalico.org"]
        resources:
          - ipreservations
        verbs:
          - list
      - apiGroups: ["crd.projectcalico.org"]
        resources:
          - globalnetworksets
          - globalnetworkpolicies
        verbs:
          - get
          - list
          - watch
      - apiGroups: ["crd.projectcalico.org"]
        resources:
          - tier.globalnetworkpolicies
          - tier.globalnetworksets
        verbs:
          - get
          - list
          - watch
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: calico-kube-controllers
    rules:
      - apiGroups: [""]
        resources:
          - nodes
          - pods
          - namespaces
          - serviceaccounts
        verbs:
          - get
          - list
          - watch
      - apiGroups: ["networking.k8s.io"]
        resources:
          - networkpolicies
        verbs:
          - get
          - list
          - watch
      - apiGroups: ["crd.projectcalico.org"]
        resources:
          - globalfelixconfigs
          - felixconfigurations
          - bgppeers
          - globalbgpconfigs
          - bgpconfigurations
          - ippools
          - ipamblocks
          - ipamhandles
          - ipamconfigs
          - blockaffinities
          - clusterinformations
          - hostendpoints
          - caliconodestatuses
        verbs:
          - get
          - list
          - watch
      - apiGroups: ["crd.projectcalico.org"]
        resources:
          - globalnetworkpolicies
          - globalnetworksets
          - networkpolicies
          - networksets
        verbs:
          - get
          - list
          - watch
      - apiGroups: [""]
        resources:
          - endpoints
          - services
        verbs:
          - get
          - list
          - watch
      - apiGroups: ["discovery.k8s.io"]
        resources:
          - endpointslices
        verbs:
          - get
          - list
          - watch
    ---
    # Calico ClusterRoleBindings
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: calico-node
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: calico-node
    subjects:
      - kind: ServiceAccount
        name: calico-node
        namespace: kube-system
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: calico-kube-controllers
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: calico-kube-controllers
    subjects:
      - kind: ServiceAccount
        name: calico-kube-controllers
        namespace: kube-system
    ---
    # Calico DaemonSet
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      name: calico-node
      namespace: kube-system
      labels:
        k8s-app: calico-node
    spec:
      selector:
        matchLabels:
          k8s-app: calico-node
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
      template:
        metadata:
          labels:
            k8s-app: calico-node
        spec:
          nodeSelector:
            kubernetes.io/os: linux
          hostNetwork: true
          tolerations:
            - effect: NoSchedule
              operator: Exists
            - effect: NoExecute
              operator: Exists
            - key: CriticalAddonsOnly
              operator: Exists
          serviceAccountName: calico-node
          priorityClassName: system-node-critical
          containers:
            - name: calico-node
              image: docker.io/calico/node:v3.28.0
              env:
                - name: DATASTORE_TYPE
                  value: kubernetes
                - name: WAIT_FOR_DATASTORE
                  value: "true"
                - name: NODENAME
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
                - name: CALICO_NETWORKING_BACKEND
                  value: bird
                - name: CLUSTER_TYPE
                  value: "k8s,bgp"
                - name: IP
                  value: autodetect
                - name: CALICO_IPV4POOL_IPIP
                  value: Always
                - name: FELIX_IPINIPMTU
                  value: "1440"
                - name: CALICO_IPV4POOL_CIDR
                  value: "10.168.0.0/16"
                - name: CALICO_DISABLE_FILE_LOGGING
                  value: "true"
                - name: FELIX_DEFAULTENDPOINTTOHOSTACTION
                  value: ACCEPT
                - name: FELIX_IPV6SUPPORT
                  value: "false"
                - name: FELIX_HEALTHENABLED
                  value: "true"
              securityContext:
                privileged: true
              resources:
                requests:
                  cpu: 250m
              livenessProbe:
                exec:
                  command:
                    - /bin/calico-node
                    - -felix-live
                    - -bird-live
                periodSeconds: 10
                initialDelaySeconds: 10
                failureThreshold: 6
                timeoutSeconds: 10
              readinessProbe:
                exec:
                  command:
                    - /bin/calico-node
                    - -felix-ready
                    - -bird-ready
                periodSeconds: 10
                timeoutSeconds: 10
              volumeMounts:
                - mountPath: /var/lib/calico
                  name: var-lib-calico
                  readOnly: false
                - mountPath: /var/run/calico
                  name: var-run-calico
                  readOnly: false
                - mountPath: /var/log/calico
                  name: var-log-calico
                  readOnly: false
          volumes:
            - name: var-lib-calico
              hostPath:
                path: /var/lib/calico
            - name: var-run-calico
              hostPath:
                path: /var/run/calico
            - name: var-log-calico
              hostPath:
                path: /var/log/calico
    ---
    # Calico kube-controllers Deployment
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: calico-kube-controllers
      namespace: kube-system
      labels:
        k8s-app: calico-kube-controllers
    spec:
      replicas: 1
      selector:
        matchLabels:
          k8s-app: calico-kube-controllers
      strategy:
        type: Recreate
      template:
        metadata:
          name: calico-kube-controllers
          namespace: kube-system
          labels:
            k8s-app: calico-kube-controllers
        spec:
          nodeSelector:
            kubernetes.io/os: linux
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
            - effect: NoSchedule
              operator: Exists
          serviceAccountName: calico-kube-controllers
          priorityClassName: system-cluster-critical
          containers:
            - name: calico-kube-controllers
              image: docker.io/calico/kube-controllers:v3.28.0
              env:
                - name: ENABLED_CONTROLLERS
                  value: node
                - name: DATASTORE_TYPE
                  value: kubernetes
              readinessProbe:
                exec:
                  command:
                    - /usr/bin/check-status
                    - -r

