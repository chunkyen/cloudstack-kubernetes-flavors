  csi-controller.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: cloudstack-csi-controller
      namespace: kube-system
    spec:
      replicas: 2
      selector:
        matchLabels:
          app.kubernetes.io/name: cloudstack-csi-controller
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cloudstack-csi-controller
        spec:
          serviceAccountName: cloudstack-csi-controller
          containers:
            - name: csi-provisioner
              image: registry.k8s.io/sig-storage/csi-provisioner:v5.0.1
              args:
                - --csi-address=$(ADDRESS)
                - --v=5
                - --timeout=5m
                - --feature-gates=Topology=true
                - --extra-create-metadata
                - --leader-election
                - --default-fstype=ext4
              env:
                - name: ADDRESS
                  value: /var/lib/csi/sockets/plugin.io/csi.sock
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/plugin.io
            - name: csi-attacher
              image: registry.k8s.io/sig-storage/csi-attacher:v4.6.1
              args:
                - --csi-address=$(ADDRESS)
                - --v=5
                - --timeout=5m
                - --leader-election
              env:
                - name: ADDRESS
                  value: /var/lib/csi/sockets/plugin.io/csi.sock
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/plugin.io
            - name: csi-snapshotter
              image: registry.k8s.io/sig-storage/csi-snapshotter:v6.3.0
              args:
                - --csi-address=$(ADDRESS)
                - --v=5
                - --timeout=5m
                - --leader-election
              env:
                - name: ADDRESS
                  value: /var/lib/csi/sockets/plugin.io/csi.sock
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/plugin.io
            - name: csi-resizer
              image: registry.k8s.io/sig-storage/csi-resizer:v1.11.1
              args:
                - --csi-address=$(ADDRESS)
                - --v=5
                - --timeout=5m
                - --leader-election
                - --handle-volume-inuse-error=true
              env:
                - name: ADDRESS
                  value: /var/lib/csi/sockets/plugin.io/csi.sock
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/plugin.io
            - name: cloudstack-csi-driver
              image: ghcr.io/cloudstack/cloudstack-csi-driver:main
              args:
                - controller
                - --endpoint=$(CSI_ENDPOINT)
                - --cloudstack-config=/etc/cloudstack-csi-driver/cloud-config
                - --logging-format=text
                - --v=4
              env:
                - name: CSI_ENDPOINT
                  value: unix:///var/lib/csi/sockets/plugin.io/csi.sock
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/plugin.io
                - name: cloudstack-conf
                  mountPath: /etc/cloudstack-csi-driver
          volumes:
            - name: socket-dir
              emptyDir: {}
            - name: cloudstack-conf
              secret:
                secretName: cloudstack-secret
  csi-node.yaml: |
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      name: cloudstack-csi-node
      namespace: kube-system
    spec:
      selector:
        matchLabels:
          app.kubernetes.io/name: cloudstack-csi-node
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cloudstack-csi-node
        spec:
          serviceAccountName: cloudstack-csi-node
          hostNetwork: true
          containers:
            - name: cloudstack-csi-driver
              image: ghcr.io/cloudstack/cloudstack-csi-driver:main
              args:
                - node
                - --endpoint=$(CSI_ENDPOINT)
                - --cloudstack-config=/etc/cloudstack-csi-driver/cloud-config
                - --logging-format=text
                - --node-name=$(NODE_NAME)
                - --v=4
              env:
                - name: CSI_ENDPOINT
                  value: unix:///csi/csi.sock
                - name: NODE_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
              securityContext:
                privileged: true
              volumeMounts:
                - name: plugin-dir
                  mountPath: /csi
                - name: kubelet-dir
                  mountPath: /var/lib/kubelet
                  mountPropagation: Bidirectional
                - name: device-dir
                  mountPath: /dev
                - name: cloudstack-conf
                  mountPath: /etc/cloudstack-csi-driver
            - name: node-driver-registrar
              image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.10.1
              args:
                - --csi-address=$(ADDRESS)
                - --kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)
                - --v=5
              env:
                - name: ADDRESS
                  value: /csi/csi.sock
                - name: DRIVER_REG_SOCK_PATH
                  value: /var/lib/kubelet/plugins/csi.cloudstack.apache.org/csi.sock
              volumeMounts:
                - name: plugin-dir
                  mountPath: /csi
                - name: registration-dir
                  mountPath: /registration
          volumes:
            - name: plugin-dir
              hostPath:
                path: /var/lib/kubelet/plugins/csi.cloudstack.apache.org/
                type: DirectoryOrCreate
            - name: registration-dir
              hostPath:
                path: /var/lib/kubelet/plugins_registry/
                type: Directory
            - name: kubelet-dir
              hostPath:
                path: /var/lib/kubelet
                type: Directory
            - name: device-dir
              hostPath:
                path: /dev
                type: Directory
            - name: cloudstack-conf
              secret:
                secretName: cloudstack-secret
  csi-csidriver.yaml: |
    apiVersion: storage.k8s.io/v1
    kind: CSIDriver
    metadata:
      name: csi.cloudstack.apache.org
    spec:
      attachRequired: true
      podInfoOnMount: true
      fsGroupPolicy: File
      volumeLifecycleModes:
        - Persistent
        - Ephemeral
  csi-storageclass.yaml: |
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: cloudstack-ssd
    provisioner: csi.cloudstack.apache.org
    parameters:
      csi.cloudstack.apache.org/disk-offering-id: "<disk-offering-uuid>"
    volumeBindingMode: WaitForFirstConsumer
    reclaimPolicy: Delete

# ─── ClusterResourceSet — Applies ConfigMap to workload cluster ────
apiVersion: addons.cluster.x-k8s.io/v1beta2
kind: ClusterResourceSet
metadata:
  name: capc-cluster-1-full-stack
  namespace: capc-cluster-1
spec:
  strategy: Reconcile
  clusterSelector:
    matchLabels:
      capc-one-shot: "full-stack"
  resources:
    - name: capc-cluster-1-post-deploy
