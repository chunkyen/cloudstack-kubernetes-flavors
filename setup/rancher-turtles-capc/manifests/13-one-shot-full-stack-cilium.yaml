# One-Shot Full-Stack CAPC Cluster — CCM + CSI + Rancher Auto-Import
#
# Apply this file to get:
#   ✅ Kubernetes cluster (1 control plane + 2 workers)
#   ✅ CloudStack CCM (Kubernetes Provider) — LoadBalancer services + node labels
#   ✅ CloudStack CSI Driver — persistent storage with PVC support
#   ✅ Rancher auto-import — cluster appears in Rancher UI automatically
#
# This is the CAPC equivalent of CKS's "one ISO, everything works" experience.
#
# CNI (Calico), CCM, and CSI are all installed automatically via
# ClusterResourceSet (see Step 3 in full-stack-onboarding.md).
#
# IMPORTANT: Replace ALL of the following before applying:
#
# 1. <reserved-public-ip>   — A free public IP from CloudStack network
#    Find free IPs: cmk list publicipaddresses listall=true zoneid=<zone-id> forvirtualnetwork=true allocatedonly=false
#
# 2. <network-name-or-id>   — CloudStack network name or ID
#    List networks: cmk list networks listall=true zoneid=<zone-id>
#
# 3. <zone-name-or-id>      — CloudStack zone name or ID
#    List zones: cmk list zones
#
# 4. capc-ubuntu24-1.35     — CAPI-compatible template name
#    Must be registered in CloudStack. Prebuilt images: http://packages.shapeblue.com/cluster-api-provider-cloudstack/images/
#
# 5. kube control / kube worker1  — CloudStack service offering names
#    List offerings: cmk list serviceofferings listall=true
#    Control plane needs ≥2GB RAM, 2 vCPU
#
# 6. cylabnb-k1  — CloudStack SSH keypair name (registered via cmk)
#    cmk register-sshkeypair --name=cylabnb-k1 --publickey="$(cat ~/.ssh/id_ed25519.pub)"
#
# 7. <cloudstack-api-url>   — CloudStack management server API URL
#    Example: http://192.168.1.100:8080/client/api
#
# 8. <api-key> / <secret-key>  — CloudStack API credentials
#    Get from CloudStack UI → Account → API Key
#
# ---
# Usage:
#   kubectl apply -f 13-one-shot-full-stack.yaml
#
# That's it. Wait ~5 minutes, then check Rancher UI.
# ---

# ─── Namespace ─────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: capc-cluster-1

# ─── CloudStack Credentials Secret ─────────────────────────────────
# Used by CAPC (via acsEndpoint) and referenced by CCM/CSI ConfigMap
apiVersion: v1
kind: Secret
metadata:
  name: cloudstack-credentials
  namespace: capc-cluster-1
type: Opaque
stringData:
  api-url: "<cloudstack-api-url>"
  api-key: "<api-key>"
  secret-key: "<secret-key>"
  verify-ssl: "false"

# ─── Cluster ───────────────────────────────────────────────────────
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: capc-cluster-1
  namespace: capc-cluster-1
  labels:
    # This label tells Rancher Turtles to automatically import this CAPI cluster
    # into Rancher once its ControlPlaneAvailable condition is True.
    cluster-api.cattle.io/rancher-auto-import: "true"
    capc-one-shot: "full-stack"
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - "10.168.0.0/16"
    serviceDomain: cluster.local
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: capc-cluster-1-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
    kind: CloudStackCluster
    name: capc-cluster-1

# ─── CloudStackCluster ─────────────────────────────────────────────
apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
kind: CloudStackCluster
metadata:
  name: capc-cluster-1
  namespace: capc-cluster-1
spec:
  controlPlaneEndpoint:
    host: "<reserved-public-ip>"
    port: 6443
  failureDomains:
    - name: "<zone-name-or-id>"
      zone:
        name: "<zone-name-or-id>"
        network:
          name: "<network-name-or-id>"
      acsEndpoint:
        name: cloudstack-credentials
        namespace: capc-cluster-1
      offering: DefaultNetworkOfferingforKubernetesService
      syncWithACS: true

# ─── KubeadmControlPlane ───────────────────────────────────────────
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: capc-cluster-1-control-plane
  namespace: capc-cluster-1
spec:
  replicas: 1
  version: v1.35.0
  kubeadmConfigSpec:
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          provider-id: "cloudstack:///'{{ ds.meta_data.instance_id }}'"
        name: "{{ local_hostname }}"
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          provider-id: "cloudstack:///'{{ ds.meta_data.instance_id }}'"
        name: "{{ local_hostname }}"
    preKubeadmCommands:
      - swapoff -a
    postKubeadmCommands:
      - echo "Control plane setup complete"
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
      kind: CloudStackMachineTemplate
      name: capc-cluster-1-control-plane

# ─── Control Plane Machine Template ────────────────────────────────
apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
kind: CloudStackMachineTemplate
metadata:
  name: capc-cluster-1-control-plane
  namespace: capc-cluster-1
spec:
  template:
    spec:
      offering:
        name: "kube control"
      sshKey: "cylabnb-k1"
      template:
        name: "capc-ubuntu24-1.35"

# ─── MachineDeployment (Workers) ───────────────────────────────────
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: capc-cluster-1-md-0
  namespace: capc-cluster-1
spec:
  clusterName: capc-cluster-1
  replicas: 2
  selector:
    matchLabels: null
  template:
    spec:
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: capc-cluster-1-md-0
      clusterName: capc-cluster-1
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
        kind: CloudStackMachineTemplate
        name: capc-cluster-1-md-0
      version: v1.35.0

# ─── Worker Machine Template ───────────────────────────────────────
apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
kind: CloudStackMachineTemplate
metadata:
  name: capc-cluster-1-md-0
  namespace: capc-cluster-1
spec:
  template:
    spec:
      offering:
        name: "kube worker1"
      sshKey: "cylabnb-k1"
      template:
        name: "capc-ubuntu24-1.35"

# ─── KubeadmConfigTemplate (Workers) ───────────────────────────────
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: capc-cluster-1-md-0
  namespace: capc-cluster-1
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            provider-id: "cloudstack:///'{{ ds.meta_data.instance_id }}'"
          name: "{{ local_hostname }}"
      preKubeadmCommands:
        - swapoff -a

# ─── Post-Deployment ConfigMap (CNI + CCM + CSI) ───────────────────
# ClusterResourceSet will apply these to the workload cluster after it's ready.
apiVersion: v1
kind: ConfigMap
metadata:
  name: capc-cluster-1-post-deploy
  namespace: capc-cluster-1
  labels:
    capc-one-shot: "full-stack"
data:
  # ─── CNI: Cilium v1.16.0 (Helm-generated manifest) ────────
  # Generated: helm template cilium cilium/cilium --version 1.16.0
  cni-cilium.yaml: |
    ---
    # Source: cilium/templates/cilium-agent/serviceaccount.yaml
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: "cilium"
      namespace: kube-system
    ---
    # Source: cilium/templates/cilium-envoy/serviceaccount.yaml
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: "cilium-envoy"
      namespace: kube-system
    ---
    # Source: cilium/templates/cilium-operator/serviceaccount.yaml
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: "cilium-operator"
      namespace: kube-system
    ---
    # Source: cilium/templates/cilium-ca-secret.yaml
    apiVersion: v1
    kind: Secret
    metadata:
      name: cilium-ca
      namespace: kube-system
    data:
      ca.crt: 
      ca.key: 
    ---
    # Source: cilium/templates/hubble/tls-helm/server-secret.yaml
    apiVersion: v1
    kind: Secret
    metadata:
      name: hubble-server-certs
      namespace: kube-system
    type: kubernetes.io/tls
    data:
      ca.crt:  
      tls.crt: 
      tls.key: 
    ---
    # Source: cilium/templates/cilium-configmap.yaml
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: cilium-config
      namespace: kube-system
    data:
    
      # Identity allocation mode selects how identities are shared between cilium
      # nodes by setting how they are stored. The options are "crd" or "kvstore".
      # - "crd" stores identities in kubernetes as CRDs (custom resource definition).
      #   These can be queried with:
      #     kubectl get ciliumid
      # - "kvstore" stores identities in an etcd kvstore, that is
      #   configured below. Cilium versions before 1.6 supported only the kvstore
      #   backend. Upgrades from these older cilium versions should continue using
      #   the kvstore by commenting out the identity-allocation-mode below, or
      #   setting it to "kvstore".
      identity-allocation-mode: crd
      identity-heartbeat-timeout: "30m0s"
      identity-gc-interval: "15m0s"
      cilium-endpoint-gc-interval: "5m0s"
      nodes-gc-interval: "5m0s"
    
      # If you want to run cilium in debug mode change this value to true
      debug: "false"
      debug-verbose: ""
      # The agent can be put into the following three policy enforcement modes
      # default, always and never.
      # https://docs.cilium.io/en/latest/security/policy/intro/#policy-enforcement-modes
      enable-policy: "default"
      policy-cidr-match-mode: ""
      # If you want metrics enabled in cilium-operator, set the port for
      # which the Cilium Operator will have their metrics exposed.
      # NOTE that this will open the port on the nodes where Cilium operator pod
      # is scheduled.
      operator-prometheus-serve-addr: ":9963"
      enable-metrics: "true"
    
      # Enable IPv4 addressing. If enabled, all endpoints are allocated an IPv4
      # address.
      enable-ipv4: "true"
    
      # Enable IPv6 addressing. If enabled, all endpoints are allocated an IPv6
      # address.
      enable-ipv6: "false"
      # Users who wish to specify their own custom CNI configuration file must set
      # custom-cni-conf to "true", otherwise Cilium may overwrite the configuration.
      custom-cni-conf: "false"
      enable-bpf-clock-probe: "false"
      # If you want cilium monitor to aggregate tracing for packets, set this level
      # to "low", "medium", or "maximum". The higher the level, the less packets
      # that will be seen in monitor output.
      monitor-aggregation: medium
    
      # The monitor aggregation interval governs the typical time between monitor
      # notification events for each allowed connection.
      #
      # Only effective when monitor aggregation is set to "medium" or higher.
      monitor-aggregation-interval: "5s"
    
      # The monitor aggregation flags determine which TCP flags which, upon the
      # first observation, cause monitor notifications to be generated.
      #
      # Only effective when monitor aggregation is set to "medium" or higher.
      monitor-aggregation-flags: all
      # Specifies the ratio (0.0-1.0] of total system memory to use for dynamic
      # sizing of the TCP CT, non-TCP CT, NAT and policy BPF maps.
      bpf-map-dynamic-size-ratio: "0.0025"
      # bpf-policy-map-max specifies the maximum number of entries in endpoint
      # policy map (per endpoint)
      bpf-policy-map-max: "16384"
      # bpf-lb-map-max specifies the maximum number of entries in bpf lb service,
      # backend and affinity maps.
      bpf-lb-map-max: "65536"
      bpf-lb-external-clusterip: "false"
    
      bpf-events-drop-enabled: "true"
      bpf-events-policy-verdict-enabled: "true"
      bpf-events-trace-enabled: "true"
    
      # Pre-allocation of map entries allows per-packet latency to be reduced, at
      # the expense of up-front memory allocation for the entries in the maps. The
      # default value below will minimize memory usage in the default installation;
      # users who are sensitive to latency may consider setting this to "true".
      #
      # This option was introduced in Cilium 1.4. Cilium 1.3 and earlier ignore
      # this option and behave as though it is set to "true".
      #
      # If this value is modified, then during the next Cilium startup the restore
      # of existing endpoints and tracking of ongoing connections may be disrupted.
      # As a result, reply packets may be dropped and the load-balancing decisions
      # for established connections may change.
      #
      # If this option is set to "false" during an upgrade from 1.3 or earlier to
      # 1.4 or later, then it may cause one-time disruptions during the upgrade.
      preallocate-bpf-maps: "false"
    
      # Name of the cluster. Only relevant when building a mesh of clusters.
      cluster-name: default
      # Unique ID of the cluster. Must be unique across all conneted clusters and
      # in the range of 1 and 255. Only relevant when building a mesh of clusters.
      cluster-id: "0"
    
      # Encapsulation mode for communication between nodes
      # Possible values:
      #   - disabled
      #   - vxlan (default)
      #   - geneve
      routing-mode: "native"
      service-no-backend-response: "reject"
    
    
      # Enables L7 proxy for L7 policy enforcement and visibility
      enable-l7-proxy: "true"
    
      enable-ipv4-masquerade: "true"
      enable-ipv4-big-tcp: "false"
      enable-ipv6-big-tcp: "false"
      enable-ipv6-masquerade: "true"
      enable-tcx: "true"
      datapath-mode: "veth"
      enable-bpf-masquerade: "true"
      enable-masquerade-to-route-source: "false"
    
      enable-xt-socket-fallback: "true"
      install-no-conntrack-iptables-rules: "false"
    
      auto-direct-node-routes: "true"
      direct-routing-skip-unreachable: "false"
      enable-local-redirect-policy: "false"
      enable-runtime-device-detection: "true"
    
      kube-proxy-replacement: "true"
      kube-proxy-replacement-healthz-bind-address: ""
      bpf-lb-sock: "false"
      bpf-lb-sock-terminate-pod-connections: "false"
      nodeport-addresses: ""
      enable-health-check-nodeport: "true"
      enable-health-check-loadbalancer-ip: "false"
      node-port-bind-protection: "true"
      enable-auto-protect-node-port-range: "true"
      bpf-lb-acceleration: "disabled"
      enable-svc-source-range-check: "true"
      enable-l2-neigh-discovery: "true"
      arping-refresh-period: "30s"
      k8s-require-ipv4-pod-cidr: "false"
      k8s-require-ipv6-pod-cidr: "false"
      enable-endpoint-routes: "true"
      enable-k8s-networkpolicy: "true"
      # Tell the agent to generate and write a CNI configuration file
      write-cni-conf-when-ready: /host/etc/cni/net.d/05-cilium.conflist
      cni-exclusive: "true"
      cni-log-file: "/var/run/cilium/cilium-cni.log"
      enable-endpoint-health-checking: "true"
      enable-health-checking: "true"
      enable-well-known-identities: "false"
      enable-node-selector-labels: "false"
      synchronize-k8s-nodes: "true"
      operator-api-serve-addr: "127.0.0.1:9234"
      # Enable Hubble gRPC service.
      enable-hubble: "true"
      # UNIX domain socket for Hubble server to listen to.
      hubble-socket-path: "/var/run/cilium/hubble.sock"
      hubble-export-file-max-size-mb: "10"
      hubble-export-file-max-backups: "5"
      # An additional address for Hubble server to listen to (e.g. ":4244").
      hubble-listen-address: ":4244"
      hubble-disable-tls: "false"
      hubble-tls-cert-file: /var/lib/cilium/tls/hubble/server.crt
      hubble-tls-key-file: /var/lib/cilium/tls/hubble/server.key
      hubble-tls-client-ca-files: /var/lib/cilium/tls/hubble/client-ca.crt
      ipam: "kubernetes"
      ipam-cilium-node-update-rate: "15s"
      egress-gateway-reconciliation-trigger-interval: "1s"
      enable-vtep: "false"
      vtep-endpoint: ""
      vtep-cidr: ""
      vtep-mask: ""
      vtep-mac: ""
      procfs: "/host/proc"
      bpf-root: "/sys/fs/bpf"
      cgroup-root: "/run/cilium/cgroupv2"
      enable-k8s-terminating-endpoint: "true"
      enable-sctp: "false"
    
      k8s-client-qps: "10"
      k8s-client-burst: "20"
      remove-cilium-node-taints: "true"
      set-cilium-node-taints: "true"
      set-cilium-is-up-condition: "true"
      unmanaged-pod-watcher-interval: "15"
      # default DNS proxy to transparent mode in non-chaining modes
      dnsproxy-enable-transparent-mode: "true"
      dnsproxy-socket-linger-timeout: "10"
      tofqdns-dns-reject-response-code: "refused"
      tofqdns-enable-dns-compression: "true"
      tofqdns-endpoint-max-ip-per-hostname: "50"
      tofqdns-idle-connection-grace-period: "0s"
      tofqdns-max-deferred-connection-deletes: "10000"
      tofqdns-proxy-response-max-delay: "100ms"
      agent-not-ready-taint-key: "node.cilium.io/agent-not-ready"
    
      mesh-auth-enabled: "true"
      mesh-auth-queue-size: "1024"
      mesh-auth-rotated-identities-queue-size: "1024"
      mesh-auth-gc-interval: "5m0s"
    
      proxy-xff-num-trusted-hops-ingress: "0"
      proxy-xff-num-trusted-hops-egress: "0"
      proxy-connect-timeout: "2"
      proxy-max-requests-per-connection: "0"
      proxy-max-connection-duration-seconds: "0"
      proxy-idle-timeout-seconds: "60"
    
      external-envoy-proxy: "true"
      envoy-base-id: "0"
    
      envoy-keep-cap-netbindservice: "false"
      max-connected-clusters: "255"
      clustermesh-enable-endpoint-sync: "false"
      clustermesh-enable-mcs-api: "false"
    
    # Extra config allows adding arbitrary properties to the cilium config.
    # By putting it at the end of the ConfigMap, it's also possible to override existing properties.
    ---
    # Source: cilium/templates/cilium-envoy/configmap.yaml
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: cilium-envoy-config
      namespace: kube-system
    data:
      bootstrap-config.json: |
        {
          "node": {
            "id": "host~127.0.0.1~no-id~localdomain",
            "cluster": "ingress-cluster"
          },
          "staticResources": {
            "listeners": [
              {
                "name": "envoy-prometheus-metrics-listener",
                "address": {
                  "socket_address": {
                    "address": "0.0.0.0",
                    "port_value": 9964
                  }
                },
                "filter_chains": [
                  {
                    "filters": [
                      {
                        "name": "envoy.filters.network.http_connection_manager",
                        "typed_config": {
                          "@type": "type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager",
                          "stat_prefix": "envoy-prometheus-metrics-listener",
                          "route_config": {
                            "virtual_hosts": [
                              {
                                "name": "prometheus_metrics_route",
                                "domains": [
                                  "*"
                                ],
                                "routes": [
                                  {
                                    "name": "prometheus_metrics_route",
                                    "match": {
                                      "prefix": "/metrics"
                                    },
                                    "route": {
                                      "cluster": "/envoy-admin",
                                      "prefix_rewrite": "/stats/prometheus"
                                    }
                                  }
                                ]
                              }
                            ]
                          },
                          "http_filters": [
                            {
                              "name": "envoy.filters.http.router",
                              "typed_config": {
                                "@type": "type.googleapis.com/envoy.extensions.filters.http.router.v3.Router"
                              }
                            }
                          ],
                          "stream_idle_timeout": "0s"
                        }
                      }
                    ]
                  }
                ]
              },
              {
                "name": "envoy-health-listener",
                "address": {
                  "socket_address": {
                    "address": "127.0.0.1",
                    "port_value": 9878
                  }
                },
                "filter_chains": [
                  {
                    "filters": [
                      {
                        "name": "envoy.filters.network.http_connection_manager",
                        "typed_config": {
                          "@type": "type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager",
                          "stat_prefix": "envoy-health-listener",
                          "route_config": {
                            "virtual_hosts": [
                              {
                                "name": "health",
                                "domains": [
                                  "*"
                                ],
                                "routes": [
                                  {
                                    "name": "health",
                                    "match": {
                                      "prefix": "/healthz"
                                    },
                                    "route": {
                                      "cluster": "/envoy-admin",
                                      "prefix_rewrite": "/ready"
                                    }
                                  }
                                ]
                              }
                            ]
                          },
                          "http_filters": [
                            {
                              "name": "envoy.filters.http.router",
                              "typed_config": {
                                "@type": "type.googleapis.com/envoy.extensions.filters.http.router.v3.Router"
                              }
                            }
                          ],
                          "stream_idle_timeout": "0s"
                        }
                      }
                    ]
                  }
                ]
              }
            ],
            "clusters": [
              {
                "name": "ingress-cluster",
                "type": "ORIGINAL_DST",
                "connectTimeout": "2s",
                "lbPolicy": "CLUSTER_PROVIDED",
                "typedExtensionProtocolOptions": {
                  "envoy.extensions.upstreams.http.v3.HttpProtocolOptions": {
                    "@type": "type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions",
                    "commonHttpProtocolOptions": {
                      "idleTimeout": "60s",
                      "maxConnectionDuration": "0s",
                      "maxRequestsPerConnection": 0
                    },
                    "useDownstreamProtocolConfig": {}
                  }
                },
                "cleanupInterval": "2.500s"
              },
              {
                "name": "egress-cluster-tls",
                "type": "ORIGINAL_DST",
                "connectTimeout": "2s",
                "lbPolicy": "CLUSTER_PROVIDED",
                "typedExtensionProtocolOptions": {
                  "envoy.extensions.upstreams.http.v3.HttpProtocolOptions": {
                    "@type": "type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions",
                    "commonHttpProtocolOptions": {
                      "idleTimeout": "60s",
                      "maxConnectionDuration": "0s",
                      "maxRequestsPerConnection": 0
                    },
                    "upstreamHttpProtocolOptions": {},
                    "useDownstreamProtocolConfig": {}
                  }
                },
                "cleanupInterval": "2.500s",
                "transportSocket": {
                  "name": "cilium.tls_wrapper",
                  "typedConfig": {
                    "@type": "type.googleapis.com/cilium.UpstreamTlsWrapperContext"
                  }
                }
              },
              {
                "name": "egress-cluster",
                "type": "ORIGINAL_DST",
                "connectTimeout": "2s",
                "lbPolicy": "CLUSTER_PROVIDED",
                "typedExtensionProtocolOptions": {
                  "envoy.extensions.upstreams.http.v3.HttpProtocolOptions": {
                    "@type": "type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions",
                    "commonHttpProtocolOptions": {
                      "idleTimeout": "60s",
                      "maxConnectionDuration": "0s",
                      "maxRequestsPerConnection": 0
                    },
                    "useDownstreamProtocolConfig": {}
                  }
                },
                "cleanupInterval": "2.500s"
              },
              {
                "name": "ingress-cluster-tls",
                "type": "ORIGINAL_DST",
                "connectTimeout": "2s",
                "lbPolicy": "CLUSTER_PROVIDED",
                "typedExtensionProtocolOptions": {
                  "envoy.extensions.upstreams.http.v3.HttpProtocolOptions": {
                    "@type": "type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions",
                    "commonHttpProtocolOptions": {
