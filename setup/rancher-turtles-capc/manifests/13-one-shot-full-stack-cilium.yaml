        name: cilium-envoy
    spec:
      selector:
        matchLabels:
          k8s-app: cilium-envoy
      updateStrategy:
        rollingUpdate:
          maxUnavailable: 2
        type: RollingUpdate
      template:
        metadata:
          annotations:
            prometheus.io/port: "9964"
            prometheus.io/scrape: "true"
          labels:
            k8s-app: cilium-envoy
            name: cilium-envoy
            app.kubernetes.io/name: cilium-envoy
            app.kubernetes.io/part-of: cilium
        spec:
          securityContext:
            appArmorProfile:
              type: Unconfined
          containers:
          - name: cilium-envoy
            image: "quay.io/cilium/cilium-envoy:v1.29.7-39a2a56bbd5b3a591f69dbca51d3e30ef97e0e51@sha256:bd5ff8c66716080028f414ec1cb4f7dc66f40d2fb5a009fff187f4a9b90b566b"
            imagePullPolicy: IfNotPresent
            command:
            - /usr/bin/cilium-envoy-starter
            args:
            - '--'
            - '-c /var/run/cilium/envoy/bootstrap-config.json'
            - '--base-id 0'
            - '--log-level info'
            - '--log-format [%Y-%m-%d %T.%e][%t][%l][%n] [%g:%#] %v'
            startupProbe:
              httpGet:
                host: "127.0.0.1"
                path: /healthz
                port: 9878
                scheme: HTTP
              failureThreshold: 105
              periodSeconds: 2
              successThreshold: 1
              initialDelaySeconds: 5
            livenessProbe:
              httpGet:
                host: "127.0.0.1"
                path: /healthz
                port: 9878
                scheme: HTTP
              periodSeconds: 30
              successThreshold: 1
              failureThreshold: 10
              timeoutSeconds: 5
            readinessProbe:
              httpGet:
                host: "127.0.0.1"
                path: /healthz
                port: 9878
                scheme: HTTP
              periodSeconds: 30
              successThreshold: 1
              failureThreshold: 3
              timeoutSeconds: 5
            env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: CILIUM_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: KUBERNETES_SERVICE_HOST
              value: "REPLACE_ME"
            - name: KUBERNETES_SERVICE_PORT
              value: "6443"
            ports:
            - name: envoy-metrics
              containerPort: 9964
              hostPort: 9964
              protocol: TCP
            securityContext:
              seLinuxOptions:
                level: s0
                type: spc_t
              capabilities:
                add:
                  - NET_ADMIN
                  - SYS_ADMIN
                drop:
                  - ALL
            terminationMessagePolicy: FallbackToLogsOnError
            volumeMounts:
            - name: envoy-sockets
              mountPath: /var/run/cilium/envoy/sockets
              readOnly: false
            - name: envoy-artifacts
              mountPath: /var/run/cilium/envoy/artifacts
              readOnly: true
            - name: envoy-config
              mountPath: /var/run/cilium/envoy/
              readOnly: true
            - name: bpf-maps
              mountPath: /sys/fs/bpf
              mountPropagation: HostToContainer
          restartPolicy: Always
          priorityClassName: system-node-critical
          serviceAccountName: "cilium-envoy"
          automountServiceAccountToken: true
          terminationGracePeriodSeconds: 1
          hostNetwork: true
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: cilium.io/no-schedule
                    operator: NotIn
                    values:
                    - "true"
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    k8s-app: cilium
                topologyKey: kubernetes.io/hostname
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    k8s-app: cilium-envoy
                topologyKey: kubernetes.io/hostname
          nodeSelector:
            kubernetes.io/os: linux
          tolerations:
            - operator: Exists
          volumes:
          - name: envoy-sockets
            hostPath:
              path: "/var/run/cilium/envoy/sockets"
              type: DirectoryOrCreate
          - name: envoy-artifacts
            hostPath:
              path: "/var/run/cilium/envoy/artifacts"
              type: DirectoryOrCreate
          - name: envoy-config
            configMap:
              name: cilium-envoy-config
              # note: the leading zero means this number is in octal representation: do not remove it
              defaultMode: 0400
              items:
                - key: bootstrap-config.json
                  path: bootstrap-config.json
            # To keep state between restarts / upgrades
            # To keep state between restarts / upgrades for bpf maps
          - name: bpf-maps
            hostPath:
              path: /sys/fs/bpf
              type: DirectoryOrCreate
    ---
    # Source: cilium/templates/cilium-operator/deployment.yaml
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: cilium-operator
      namespace: kube-system
      labels:
        io.cilium/app: operator
        name: cilium-operator
        app.kubernetes.io/part-of: cilium
        app.kubernetes.io/name: cilium-operator
    spec:
      # See docs on ServerCapabilities.LeasesResourceLock in file pkg/k8s/version/version.go
      # for more details.
      replicas: 1
      selector:
        matchLabels:
          io.cilium/app: operator
          name: cilium-operator
      # ensure operator update on single node k8s clusters, by using rolling update with maxUnavailable=100% in case
      # of one replica and no user configured Recreate strategy.
      # otherwise an update might get stuck due to the default maxUnavailable=50% in combination with the
      # podAntiAffinity which prevents deployments of multiple operator replicas on the same node.
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 100%
        type: RollingUpdate
      template:
        metadata:
          annotations:
            prometheus.io/port: "9963"
            prometheus.io/scrape: "true"
          labels:
            io.cilium/app: operator
            name: cilium-operator
            app.kubernetes.io/part-of: cilium
            app.kubernetes.io/name: cilium-operator
        spec:
          containers:
          - name: cilium-operator
            image: "quay.io/cilium/operator-generic:v1.16.0@sha256:d6621c11c4e4943bf2998af7febe05be5ed6fdcf812b27ad4388f47022190316"
            imagePullPolicy: IfNotPresent
            command:
            - cilium-operator-generic
            args:
            - --config-dir=/tmp/cilium/config-map
            - --debug=$(CILIUM_DEBUG)
            env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: CILIUM_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: CILIUM_DEBUG
              valueFrom:
                configMapKeyRef:
                  key: debug
                  name: cilium-config
                  optional: true
            - name: KUBERNETES_SERVICE_HOST
              value: "REPLACE_ME"
            - name: KUBERNETES_SERVICE_PORT
              value: "6443"
            ports:
            - name: prometheus
              containerPort: 9963
              hostPort: 9963
              protocol: TCP
            livenessProbe:
              httpGet:
                host: "127.0.0.1"
                path: /healthz
                port: 9234
                scheme: HTTP
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 3
            readinessProbe:
              httpGet:
                host: "127.0.0.1"
                path: /healthz
                port: 9234
                scheme: HTTP
              initialDelaySeconds: 0
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 5
            volumeMounts:
            - name: cilium-config-path
              mountPath: /tmp/cilium/config-map
              readOnly: true
            terminationMessagePolicy: FallbackToLogsOnError
          hostNetwork: true
          restartPolicy: Always
          priorityClassName: system-cluster-critical
          serviceAccountName: "cilium-operator"
          automountServiceAccountToken: true
          # In HA mode, cilium-operator pods must not be scheduled on the same
          # node as they will clash with each other.
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    io.cilium/app: operator
                topologyKey: kubernetes.io/hostname
          nodeSelector:
            kubernetes.io/os: linux
          tolerations:
            - operator: Exists
          volumes:
            # To read the configuration from the config map
          - name: cilium-config-path
            configMap:
              name: cilium-config
    
