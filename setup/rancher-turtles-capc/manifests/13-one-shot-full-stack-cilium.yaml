                      type: string
                    volumeSnapshotClassName:
                      type: string
                    volumeSnapshotRef:
                      type: object
                      properties:
                        apiVersion:
                          type: string
                        fieldPath:
                          type: string
                        kind:
                          type: string
                        name:
                          type: string
                        namespace:
                          type: string
                status:
                  type: object
                  properties:
                    creationTime:
                      type: integer
                    error:
                      type: object
                      properties:
                        message:
                          type: string
                        time:
                          type: string
                    readyToUse:
                      type: boolean
                    restoreSize:
                      type: integer
                    snapshotHandle:
                      type: string
          served: true
          storage: true
          subresources:
            status: {}
    ---
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: volumesnapshots.snapshot.storage.k8s.io
    spec:
      group: snapshot.storage.k8s.io
      names:
        kind: VolumeSnapshot
        listKind: VolumeSnapshotList
        plural: volumesnapshots
        shortNames:
          - vs
        singular: volumesnapshot
      scope: Namespaced
      versions:
        - additionalPrinterColumns:
            - description: Indicates if the snapshot is ready to be used to restore a volume.
              jsonPath: .status.readyToUse
              name: ReadyToUse
              type: boolean
            - description: If a new snapshot needs to be created, the name of the source PVC from which this snapshot was (or will be) created.
              jsonPath: .spec.source.persistentVolumeClaimName
              name: SourcePVC
              type: string
            - description: If a snapshot already exists, the name of the source VolumeSnapshotContent from which this snapshot was (or will be) created.
              jsonPath: .spec.source.volumeSnapshotContentName
              name: SourceSnapshotContent
              type: string
            - description: Represents the minimum size of the underlying volume required to re-create a volume from this snapshot.
              jsonPath: .status.restoreSize
              name: RestoreSize
              type: string
            - description: The name of the VolumeSnapshotClass requested by the VolumeSnapshot.
              jsonPath: .spec.volumeSnapshotClassName
              name: SnapshotClass
              type: string
            - description: Name of the VolumeSnapshotContent object to which the VolumeSnapshot object intends to bind to.
              jsonPath: .status.boundVolumeSnapshotContentName
              name: SnapshotContent
              type: string
            - description: Timestamp when the point-in-time snapshot was taken by the underlying storage system.
              jsonPath: .status.creationTime
              name: CreationTime
              type: date
            - jsonPath: .metadata.creationTimestamp
              name: Age
              type: date
          name: v1
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  properties:
                    source:
                      type: object
                      properties:
                        persistentVolumeClaimName:
                          type: string
                        volumeSnapshotContentName:
                          type: string
                    volumeSnapshotClassName:
                      type: string
                status:
                  type: object
                  properties:
                    boundVolumeSnapshotContentName:
                      type: string
                    creationTime:
                      type: string
                    error:
                      type: object
                      properties:
                        message:
                          type: string
                        time:
                          type: string
                    readyToUse:
                      type: boolean
                    restoreSize:
                      type: string
          served: true
          storage: true
          subresources:
            status: {}
  csi-rbac.yaml: |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: cloudstack-csi-controller
      namespace: kube-system
    ---
    apiVersion: v1
    kind: ServiceAccount
