# HA CAPC cluster — 3 control planes + 3 workers
#
# IMPORTANT: Replace ALL of the following before applying:
#
# 1. <reserved-public-ip>   — A free public IP from CloudStack network
#    Find free IPs: cmk list publicipaddresses listall=true zoneid=<zone-id> forvirtualnetwork=true allocatedonly=false
#
# 2. <network-name-or-id>   — CloudStack network name or ID
#    List networks: cmk list networks listall=true zoneid=<zone-id>
#
# 3. <zone-name-or-id>      — CloudStack zone name or ID
#    List zones: cmk list zones
#
# 4. capc-ubuntu-2404-kube-v1.32.3  — CAPI-compatible template name
#    Must be registered in CloudStack. Prebuilt images: http://packages.shapeblue.com/cluster-api-provider-cloudstack/images/
#
# 5. Large  — CloudStack service offering names
#    List offerings: cmk list serviceofferings listall=true
#    Control plane needs ≥2GB RAM, 2 vCPU
#
# 6. my-ssh-key  — CloudStack SSH keypair name (registered via cmk)
#    cmk register-sshkeypair --name=my-ssh-key --publickey="$(cat ~/.ssh/id_ed25519.pub)"
#
# Namespace: All CAPI resources are created in the namespace specified here
# (default). This is the namespace on the management (Rancher) cluster where
# CloudStackCluster, KubeadmControlPlane, MachineDeployment, etc. live.
# The workload cluster itself is just VMs on CloudStack — it has no namespace.
# To apply to a different namespace without editing the file:
#   kubectl apply -f 11-ha-cluster.yaml -n my-clusters
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: capc-cluster-ha
  namespace: capc-cluster-ha
  labels:
    # This label tells Rancher Turtles to automatically import this CAPI cluster
    # into Rancher once its ControlPlaneAvailable condition is True.
    cluster-api.cattle.io/rancher-auto-import: "true"
spec:
  clusterNetwork:
    pods:
      cidrBlocks: ["10.244.0.0/16"]
    serviceDomain: cluster.local
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: capc-cluster-ha-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
    kind: CloudStackCluster
    name: capc-cluster-ha
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
kind: CloudStackCluster
metadata:
  name: capc-cluster-ha
  namespace: capc-cluster-ha
spec:
  controlPlaneEndpoint:
    host: "<reserved-public-ip>"  # Reserved public IP from CloudStack network
    port: 6443
  failureDomains:
    - name: fd-1
      zone:
        name: "<zone-name-or-id>"
        network:
          name: "<network-name-or-id>"
      acsEndpoint:
        name: cloudstack-credentials
        namespace: capc-cluster-ha
      offering: DefaultNetworkOfferingforKubernetesService
      syncWithACS: true
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: capc-cluster-ha-control-plane
  namespace: capc-cluster-ha
spec:
  replicas: 3
  version: "v1.35.0"
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
      kind: CloudStackMachineTemplate
      name: capc-cluster-ha-control-plane
  kubeadmConfigSpec:
    clusterConfiguration:
      apiServer:
        certSANs:
          - "<reserved-public-ip>"  # Must match controlPlaneEndpoint.host
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          provider-id: "cloudstack:///'{{ ds.meta_data.instance_id }}'"
        name: "{{ local_hostname }}"
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          provider-id: "cloudstack:///'{{ ds.meta_data.instance_id }}'"
        name: "{{ local_hostname }}"
    preKubeadmCommands:
      - swapoff -a
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
kind: CloudStackMachineTemplate
metadata:
  name: capc-cluster-ha-control-plane
  namespace: capc-cluster-ha
spec:
  template:
    spec:
      offering:
        name: "Large"
      template:
        name: "capc-ubuntu-2404-kube-v1.35.0"
      sshKey: "my-ssh-key"  # CloudStack SSH keypair name (registered via cmk register-sshkeypair)
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: capc-cluster-ha-workers
  namespace: capc-cluster-ha
spec:
  replicas: 3
  clusterName: capc-cluster-ha
  selector:
    matchLabels: null
  template:
    spec:
      clusterName: capc-cluster-ha
      version: "v1.35.0"
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: capc-cluster-ha-workers
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
        kind: CloudStackMachineTemplate
        name: capc-cluster-ha-workers
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta3
kind: CloudStackMachineTemplate
metadata:
  name: capc-cluster-ha-workers
  namespace: capc-cluster-ha
spec:
  template:
    spec:
      offering:
        name: "Large"
      template:
        name: "capc-ubuntu-2404-kube-v1.35.0"
      sshKey: "my-ssh-key"  # CloudStack SSH keypair name (registered via cmk register-sshkeypair)
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: capc-cluster-ha-workers
  namespace: capc-cluster-ha
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            provider-id: "cloudstack:///'{{ ds.meta_data.instance_id }}'"
          name: "{{ local_hostname }}"
      preKubeadmCommands:
        - swapoff -a
