# Minimal Cluster from capc-fullstack ClusterClass
#
# This cluster YAML uses the topology-based model — every component
# (CNI, CCM, CSI) is injected automatically during creation lifecycle.
# No manual labeling, no CRS, no post-creation steps.
#
# IMPORTANT: Replace ALL parameters before applying:
#   See 30-clusterclass-fullstack.yaml for the full parameter list.

# CloudStack credentials for this specific workload cluster.
# Each CAPC cluster typically uses its own ACS endpoint and API keys,
# so credentials are defined here (per-cluster) rather than in the ClusterClass template.
#
# Two secrets needed:
#   1. cloudstack-credentials (cluster namespace) — referenced by CAPC acsEndpoint
#   2. cloudstack-secret (kube-system on workload) — mounted into CCM deployment
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudstack-credentials
  namespace: capc-cluster-2    # ← replace with your cluster namespace
type: Opaque
stringData:
  api-url: "http://<management-server>:8080/client/api"   # ← replace
  api-key: "***"                                         # ← replace
  secret-key: "<your-secret-key>"                        # ← replace
  verify-ssl: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudstack-secret
  namespace: kube-system   # injected into workload cluster — CCM reads from here
type: Opaque
stringData:
  cloud-config: |
    [Global]
    api-url = http://<management-server>:8080/client/api   # ← replace
    api-key = "***"                                        # ← replace
    secret-key = "<your-secret-key>"                       # ← replace
    ssl-no-verify = "false"
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: capc-cluster-2
  namespace: capc-cluster-2
  labels:
    turtles.cattle.io/bootstrap: "true"
    cluster-api.cattle.io/rancher-auto-import: "true"
spec:
  topology:
    class: capc-fullstack
    version: v1.35.0
    controlPlane:
      replicas: 3
    workers:
      machines:
        - name: default-worker
          replicas: 3
