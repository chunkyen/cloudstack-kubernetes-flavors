apiVersion: v1
data:
  cloudstack-ccm.yaml: |
    ---
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: cloud-controller-manager
      namespace: kube-system
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: system:cloud-controller-manager
      annotations:
        rbac.authorization.kubernetes.io/autoupdate: "true"
      labels:
        k8s-app: cloud-controller-manager
    rules:
    - apiGroups:
      - coordination.k8s.io
      resources:
      - leases
      verbs:
      - get
      - create
      - update
    - apiGroups:
      - ""
      resources:
      - configmaps
      verbs:
      - list
      - watch
    - apiGroups:
      - ""
      resources:
      - events
      verbs:
      - create
      - patch
      - update
    - apiGroups:
      - ""
      resources:
      - nodes
      verbs:
      - '*'
    - apiGroups:
      - ""
      resources:
      - pods
      verbs:
      - list
      - get
    - apiGroups:
      - ""
      resources:
      - nodes/status
      verbs:
      - patch
    - apiGroups:
      - ""
      resources:
      - services
      verbs:
      - get
      - list
      - patch
      - update
      - watch
    - apiGroups:
      - ""
      resources:
      - services/status
      verbs:
      - list
      - patch
      - update
      - watch
    - apiGroups:
      - ""
      resources:
      - serviceaccounts
      verbs:
      - create
    - apiGroups:
      - ""
      resources:
      - endpoints
      verbs:
      - create
      - get
      - list
      - watch
      - update
    - apiGroups:
      - ""
      resources:
      - persistentvolumes
      verbs:
      - list
      - watch
      - patch
    ---
    kind: ClusterRoleBinding
    apiVersion: rbac.authorization.k8s.io/v1
    metadata:
      name: system:cloud-controller-manager
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: system:cloud-controller-manager
    subjects:
    - kind: ServiceAccount
      name: cloud-controller-manager
      namespace: kube-system
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: system:cloud-controller-manager:extension-apiserver-authentication-reader
      namespace: kube-system
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: extension-apiserver-authentication-reader
    subjects:
    - kind: ServiceAccount
      name: cloud-controller-manager
      namespace: kube-system
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      labels:
        k8s-app: cloud-controller-manager
      name: cloud-controller-manager
      namespace: kube-system
    spec:
      replicas: 1
      selector:
        matchLabels:
          k8s-app: cloud-controller-manager
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          labels:
            k8s-app: cloud-controller-manager
        spec:
          containers:
          - name: cloud-controller-manager
            image: apache/cloudstack-kubernetes-provider:v1.2.0
            imagePullPolicy: IfNotPresent
            args:
            - --leader-elect=true
            - --cloud-provider=external-cloudstack
            - --cloud-config=/config/cloud-config
            resources:
              limits:
                cpu: 50m
                memory: 120Mi
              requests:
                cpu: 10m
                memory: 60Mi
            volumeMounts:
            - name: config-volume
              mountPath: /config
          restartPolicy: Always
          serviceAccountName: cloud-controller-manager
          terminationGracePeriodSeconds: 30
          volumes:
          - name: config-volume
            secret:
              secretName: cloudstack-secret
          tolerations:
          # this is required so CCM can bootstrap itself
          - key: node.cloudprovider.kubernetes.io/uninitialized
            value: "true"
            effect: NoSchedule
  cloudstack-csi-controller-deployment-rke2.yaml: |
    # In this YAML file CloudStack CSI Controller contains the following sidecars:
    # external-attacher, external-provisioner, external-resizer, liveness-probe
    #
    # RKE2 PATCH: replicas changed from 2 → 1
    #   The upstream sets replicas: 2 with podAntiAffinity requiring different hosts.
    #   With a single RKE2 control-plane node, only 1 replica can schedule.
    #   Setting replicas: 1 avoids a Pending pod and confusing scheduler backoff.
    #
    # RKE2 PATCH: podAntiAffinity removed
    #   Removed the preferredDuringSchedulingIgnoredDuringExecution podAntiAffinity
    #   rule because it conflicts with a single-node control plane. The deployment
    #   still tolerates control-plane taints and targets control-plane nodes.
    #
    # Source: https://github.com/cloudstack/cloudstack-csi-driver/blob/main/deploy/k8s/controller-deployment.yaml
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: cloudstack-csi-controller
      namespace: kube-system
    spec:
      replicas: 1                           # RKE2 PATCH: was 2 in upstream
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 0
      selector:
        matchLabels:
          app.kubernetes.io/name: cloudstack-csi-controller
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cloudstack-csi-controller
            app.kubernetes.io/part-of: cloudstack-csi-driver
        spec:
          priorityClassName: system-cluster-critical
          serviceAccountName: cloudstack-csi-controller
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
          nodeSelector:
            kubernetes.io/os: linux
          tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
          - key: CriticalAddonsOnly
            operator: Exists
          - effect: NoExecute
            operator: Exists
            tolerationSeconds: 300
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch

          containers:
            - name: cloudstack-csi-controller
              image: ghcr.io/cloudstack/cloudstack-csi-driver:3.0.0
              imagePullPolicy: Always
              args:
                - "controller"
                - "--endpoint=$(CSI_ENDPOINT)"
                - "--cloudstack-config=/etc/cloudstack-csi-driver/cloud-config"
                - "--logging-format=text"
                - "--v=4"
              env:
                - name: CSI_ENDPOINT
                  value: unix:///var/lib/csi/sockets/pluginproxy/csi.sock
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/pluginproxy/
                - name: cloudstack-conf
                  mountPath: /etc/cloudstack-csi-driver
              ports:
                - name: healthz
                  containerPort: 9808
                  protocol: TCP
              livenessProbe:
                httpGet:
                  path: /healthz
                  port: healthz
                initialDelaySeconds: 10
                timeoutSeconds: 3
                periodSeconds: 10
                failureThreshold: 5
              resources:
                requests:
                  cpu: 10m
                  memory: 40Mi
                limits:
                  memory: 256Mi
              securityContext:
                seccompProfile:
                  type: RuntimeDefault
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false

            - name: external-provisioner
              image: registry.k8s.io/sig-storage/csi-provisioner:v5.0.1
              imagePullPolicy: IfNotPresent
              args:
                - "--v=4"
                - "--timeout=300s"
                - "--csi-address=$(ADDRESS)"
                - "--kube-api-qps=100"
                - "--kube-api-burst=100"
                - "--leader-election"
                - "--leader-election-lease-duration=120s"
                - "--leader-election-renew-deadline=60s"
                - "--leader-election-retry-period=30s"
                - "--default-fstype=ext4"
                - "--feature-gates=Topology=true"
                - "--strict-topology"
              env:
                - name: ADDRESS
                  value: /var/lib/csi/sockets/pluginproxy/csi.sock
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/pluginproxy/
              securityContext:
                seccompProfile:
                  type: RuntimeDefault
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false

            - name: external-attacher
              image: registry.k8s.io/sig-storage/csi-attacher:v4.6.1
              imagePullPolicy: IfNotPresent
              args:
                - "--v=4"
                - "--timeout=300s"
                - "--csi-address=$(ADDRESS)"
                - "--leader-election"
                - "--leader-election-lease-duration=120s"
                - "--leader-election-renew-deadline=60s"
                - "--leader-election-retry-period=30s"
                - "--kube-api-qps=100"
                - "--kube-api-burst=100"
              env:
                - name: ADDRESS
                  value: /var/lib/csi/sockets/pluginproxy/csi.sock
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/pluginproxy/
              securityContext:
                seccompProfile:
                  type: RuntimeDefault
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false

            - name: external-resizer
              image: registry.k8s.io/sig-storage/csi-resizer:v1.11.1
              args:
                - "--v=5"
                - "--csi-address=$(ADDRESS)"
                - --timeout=300s
                - --leader-election
                - --leader-election-lease-duration=120s
                - --leader-election-renew-deadline=60s
                - --leader-election-retry-period=30s
                - --kube-api-qps=100
                - --kube-api-burst=100
              env:
                - name: ADDRESS
                  value: /var/lib/csi/sockets/pluginproxy/csi.sock
              imagePullPolicy: "IfNotPresent"
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/pluginproxy/
              securityContext:
                seccompProfile:
                  type: RuntimeDefault
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
            - name: csi-snapshotter
              image: registry.k8s.io/sig-storage/csi-snapshotter:v6.3.0
              args:
                - "--v=5"
                - "--csi-address=$(CSI_ADDRESS)"
                - "--leader-election"
                - "--leader-election-lease-duration=30s"
                - "--leader-election-renew-deadline=20s"
                - "--leader-election-retry-period=10s"
              env:
                - name: CSI_ADDRESS
                  value: /var/lib/csi/sockets/pluginproxy/csi.sock
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/pluginproxy/
              resources:
                limits:
                  cpu: 400m
                  memory: 200Mi
                requests:
                  cpu: 10m
                  memory: 20Mi
            - name: snapshot-controller
              image: registry.k8s.io/sig-storage/snapshot-controller:v6.3.0
              args:
                - "--v=5"
                - "--leader-election"
                - "--leader-election-lease-duration=30s"
                - "--leader-election-renew-deadline=20s"
                - "--leader-election-retry-period=10s"
              resources:
                limits:
                  cpu: 400m
                  memory: 200Mi
                requests:
                  cpu: 10m
                  memory: 20Mi
            - name: liveness-probe
              imagePullPolicy: IfNotPresent
              image: registry.k8s.io/sig-storage/livenessprobe:v2.12.0
              args:
                - "--v=4"
                - "--csi-address=$(ADDRESS)"
              env:
                - name: ADDRESS
                  value: /var/lib/csi/sockets/pluginproxy/csi.sock
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/pluginproxy/
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false

          volumes:
          - name: socket-dir
            emptyDir: {}
          - name: cloudstack-conf
            secret:
              secretName: cloudstack-secret
  cloudstack-csi-driver.yaml: |
    apiVersion: storage.k8s.io/v1
    kind: CSIDriver
    metadata:
      name: csi.cloudstack.apache.org
    spec:
      attachRequired: true
      podInfoOnMount: false
      # Supports only persistent volumes.
      volumeLifecycleModes:
        - Persistent
  cloudstack-csi-node-daemonset-rke2.yaml: |
    # Source: https://github.com/cloudstack/cloudstack-csi-driver/blob/main/deploy/k8s/node-daemonset.yaml
    #
    # RKE2 PATCH: Removed /run/cloud-init/ mount and volume
    #   The upstream CSI node DaemonSet mounts /run/cloud-init/ to read instance
    #   metadata. RKE2 nodes do NOT use cloud-init — RKE2 installs itself via
    #   tarball at bootstrap — so this directory does not exist. Without removing
    #   this mount, the CSI node container crashes with exit code 2.
    #
    #   Changes made:
    #   - Removed volumeMount:  name: cloud-init-dir, mountPath: /run/cloud-init/
    #   - Removed volume:       name: cloud-init-dir, hostPath: /run/cloud-init/
    #   - Left the Ignition metadata comment intact for reference
    #
    #   All other fields are identical to upstream.
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      name: cloudstack-csi-node
      namespace: kube-system
    spec:
      selector:
        matchLabels:
          app.kubernetes.io/name: cloudstack-csi-node
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: "10%"
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cloudstack-csi-node
            app.kubernetes.io/part-of: cloudstack-csi-driver
        spec:
          priorityClassName: system-node-critical
          serviceAccountName: cloudstack-csi-node
          nodeSelector:
            kubernetes.io/os: linux
          terminationGracePeriodSeconds: 30
          tolerations:
            - effect: NoSchedule
              operator: Exists
            - effect: NoExecute
              operator: Exists
              tolerationSeconds: 300
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0

          containers:
            - name: cloudstack-csi-node
              image: ghcr.io/cloudstack/cloudstack-csi-driver:3.0.0
              imagePullPolicy: IfNotPresent
              args:
                - "node"
                - "--endpoint=$(CSI_ENDPOINT)"
                - "--cloudstack-config=/etc/cloudstack-csi-driver/cloud-config"
                - "--logging-format=text"
                - "--node-name=$(NODE_NAME)"
                - "--v=4"
              env:
                - name: CSI_ENDPOINT
                  value: unix:///csi/csi.sock
                - name: NODE_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
              volumeMounts:
                - name: plugin-dir
                  mountPath: /csi
                - name: kubelet-dir
                  mountPath: /var/lib/kubelet
                  # needed so that any mounts setup inside this container are
                  # propagated back to the host machine.
                  mountPropagation: Bidirectional
                - name: device-dir
                  mountPath: /dev
                # RKE2 PATCH: removed cloud-init-dir mount here
                #   (upstream had volumeMount: name=cloud-init-dir, mountPath=/run/cloud-init/)
                #   RKE2 does not use cloud-init — directory absent — container crashes with exit code 2
                - name: sys-dir
                  mountPath: /sys
                # Comment the above 2 lines and uncomment the next 2 lines for Ignition support
                # - name: ignition-dir
                #   mountPath: /run/metadata
                - name: cloudstack-conf
                  mountPath: /etc/cloudstack-csi-driver
              ports:
                - name: healthz
                  containerPort: 9808
                  protocol: TCP
              livenessProbe:
                httpGet:
                  path: /healthz
                  port: healthz
                initialDelaySeconds: 10
                timeoutSeconds: 3
                periodSeconds: 10
                failureThreshold: 5
              resources:
                limits:
                  cpu: "200m"
                  memory: 200Mi
                requests:
                  cpu: "50m"
                  memory: 50Mi
              securityContext:
                # readOnlyRootFilesystem: true
                privileged: true

            - name: node-driver-registrar
              image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.10.1
              imagePullPolicy: IfNotPresent
              args:
                - "--csi-address=$(ADDRESS)"
                - "--kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)"
                - "--v=5"
                - "--health-port=9809"
              env:
                - name: ADDRESS
                  value: /csi/csi.sock
                - name: DRIVER_REG_SOCK_PATH
                  value: /var/lib/kubelet/plugins/csi.cloudstack.apache.org/csi.sock
              volumeMounts:
                - name: plugin-dir
                  mountPath: /csi
                - name: registration-dir
                  mountPath: /registration
              ports:
                - containerPort: 9809
                  name: healthz
              livenessProbe:
                exec:
                  command:
                    - /csi-node-driver-registrar
                    - --kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)
                    - --mode=kubelet-registration-probe
                initialDelaySeconds: 30
                periodSeconds: 90
                timeoutSeconds: 15
              resources:
                limits:
                  cpu: "200m"
                  memory: 200Mi
                requests:
                  cpu: "50m"
                  memory: 50Mi
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false

            - name: liveness-probe
              image: registry.k8s.io/sig-storage/livenessprobe:v2.12.0
              imagePullPolicy: IfNotPresent
              args:
                - "--v=4"
                - "--csi-address=$(ADDRESS)"
              env:
                - name: ADDRESS
                  value: /csi/csi.sock
              volumeMounts:
                - name: plugin-dir
                  mountPath: /csi
              resources:
                limits:
                  cpu: "200m"
                  memory: 250Mi
                requests:
                  cpu: "50m"
                  memory: 50Mi
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false

          volumes:
            - name: plugin-dir
              hostPath:
                path: /var/lib/kubelet/plugins/csi.cloudstack.apache.org/
                type: DirectoryOrCreate
            - name: kubelet-dir
              hostPath:
                path: /var/lib/kubelet
                type: Directory
            - name: device-dir
              hostPath:
                path: /dev
                type: Directory
            # RKE2 PATCH: removed cloud-init-dir volume here
            #   (upstream had volume: name=cloud-init-dir, hostPath=/run/cloud-init/)
            #   RKE2 does not use cloud-init — directory absent — container crashes with exit code 2
            - name: registration-dir
              hostPath:
                path: /var/lib/kubelet/plugins_registry
                type: Directory
            - name: sys-dir
              hostPath:
                path: /sys
                type: Directory
            # Comment the above 4 lines and uncomment the next 4 lines for Ignition support
            # - name: ignition-dir
            #   hostPath:
            #     path: /run/metadata
            #     type: Directory
            - name: cloudstack-conf
              secret:
                secretName: cloudstack-secret
  cloudstack-csi-rbac.yaml: |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: cloudstack-csi-controller
      namespace: kube-system
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: cloudstack-csi-controller-role
    rules:
      - apiGroups: [""]
        resources: ["nodes", "pods"]
        verbs: ["get", "list", "watch"]
      - apiGroups: [""]
        resources: ["persistentvolumeclaims"]
        verbs: ["get", "list", "watch", "update"]
      - apiGroups: [""]
        resources: ["persistentvolumeclaims/status"]
        verbs: ["patch"]
      - apiGroups: [""]
        resources: ["persistentvolumes"]
        verbs: ["get", "list", "watch", "create", "delete", "patch"]
      - apiGroups: [""]
        resources: ["events"]
        verbs: ["get", "list", "watch", "create", "update", "patch"]
      - apiGroups: ["coordination.k8s.io"]
        resources: ["leases"]
        verbs: ["get", "watch", "list", "delete", "update", "create"]
      - apiGroups: ["storage.k8s.io"]
        resources: ["storageclasses", "csinodes"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["storage.k8s.io"]
        resources: ["volumeattachments"]
        verbs: ["get", "list", "watch", "patch"]
      - apiGroups: ["storage.k8s.io"]
        resources: ["volumeattachments/status"]
        verbs: ["patch"]
      - apiGroups: ["snapshot.storage.k8s.io"]
        resources: ["volumesnapshots", "volumesnapshots/status", "volumesnapshotclasses", "volumesnapshotcontents", "volumesnapshotcontents/status"]
        verbs: ["get", "list", "watch", "update", "create", "patch", "delete"]
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: cloudstack-csi-controller-binding
    subjects:
      - kind: ServiceAccount
        name: cloudstack-csi-controller
        namespace: kube-system
    roleRef:
      kind: ClusterRole
      name: cloudstack-csi-controller-role
      apiGroup: rbac.authorization.k8s.io
    ---
    kind: ServiceAccount
    apiVersion: v1
    metadata:
      name: cloudstack-csi-node
      namespace: kube-system
    ---
    kind: ClusterRole
    apiVersion: rbac.authorization.k8s.io/v1
    metadata:
      name: cloudstack-csi-node-role
    rules:
      - apiGroups: [""]
        resources: ["nodes"]
        verbs: ["get", "patch"]
      - apiGroups: [ "storage.k8s.io" ]
        resources: [ "volumeattachments" ]
        verbs: [ "get", "list", "watch" ]
      - apiGroups: [ "storage.k8s.io" ]
        resources: [ "csinodes" ]
        verbs: [ "get" ]
    ---
    kind: ClusterRoleBinding
    apiVersion: rbac.authorization.k8s.io/v1
    metadata:
      name: cloudstack-csi-node-binding
    subjects:
      - kind: ServiceAccount
        name: cloudstack-csi-node
        namespace: kube-system
    roleRef:
      kind: ClusterRole
      name: cloudstack-csi-node-role
      apiGroup: rbac.authorization.k8s.io
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: cloudstack-csi-snapshotter-role
    rules:
    - apiGroups: ["snapshot.storage.k8s.io"]
      resources: ["volumesnapshotclasses"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["snapshot.storage.k8s.io"]
      resources: ["volumesnapshotcontents"]
      verbs: ["create", "get", "list", "watch", "update", "delete"]
    - apiGroups: ["snapshot.storage.k8s.io"]
      resources: ["volumesnapshots"]
      verbs: ["get", "list", "watch", "update"]
    - apiGroups: ["snapshot.storage.k8s.io"]
      resources: ["volumesnapshotcontents/status"]
      verbs: ["update"]

    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: cloudstack-csi-snapshotter-binding
    subjects:
    - kind: ServiceAccount
      name: cloudstack-csi-controller
      namespace: kube-system
    roleRef:
      kind: ClusterRole
      name: cloudstack-csi-snapshotter-role
      apiGroup: rbac.authorization.k8s.io
  cloudstack-csi-storageclass.yaml: |
    # NOTE: Replace the disk-offering-id parameter below with your CloudStack storage offering UUID.
    # This is the disk offering that CloudStack will use when provisioning volumes.
    # Find the correct UUID with: cmk list diskofferings
    ---
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: cloudstack-standard
      annotations:
        storageclass.kubernetes.io/is-default-class: "true"
    provisioner: csi.cloudstack.apache.org
    parameters:
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # ⚠️  REPLACE THIS VALUE ⚠️
      # Set to your CloudStack disk offering UUID (not the name!)
      # Run: cmk list diskofferings | grep -E "id|name"
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      csi.cloudstack.apache.org/disk-offering-id: "REPLACE_WITH_YOUR_DISK_OFFERING_UUID"
